<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#080a0f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Game Timer</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #080a0f;
            --ink: #f7f9ff;
            --muted: rgba(247, 249, 255, 0.68);
            --soft: rgba(247, 249, 255, 0.48);
            --glass: rgba(255, 255, 255, 0.11);
            --glass-strong: rgba(255, 255, 255, 0.16);
            --line: rgba(255, 255, 255, 0.2);
            --line-bright: rgba(255, 255, 255, 0.34);
            --shadow: 0 18px 70px rgba(0, 0, 0, 0.42);
            --radius: 8px;
            --danger: #ff5c7a;
            --good: #4ad6a4;
            --info: #55b7ff;
            --warn: #ffcf5a;
            --control: rgba(255, 255, 255, 0.13);
            --control-active: rgba(255, 255, 255, 0.23);
            --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", Inter, system-ui, sans-serif;
        }

        :root[data-theme="light"] {
            color-scheme: light;
            --bg: #f5f7fb;
            --ink: #111827;
            --muted: rgba(17, 24, 39, 0.66);
            --soft: rgba(17, 24, 39, 0.46);
            --glass: rgba(255, 255, 255, 0.72);
            --glass-strong: rgba(255, 255, 255, 0.88);
            --line: rgba(17, 24, 39, 0.15);
            --line-bright: rgba(17, 24, 39, 0.28);
            --shadow: 0 18px 70px rgba(17, 24, 39, 0.16);
            --control: rgba(17, 24, 39, 0.07);
            --control-active: rgba(17, 24, 39, 0.13);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            min-height: 100%;
            margin: 0;
            background:
                linear-gradient(135deg, rgba(255, 255, 255, 0.04), transparent 42%),
                linear-gradient(315deg, rgba(74, 214, 164, 0.07), transparent 36%),
                var(--bg);
            color: var(--ink);
            font-family: var(--font);
            letter-spacing: 0;
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
        }

        :root[data-theme="light"] body {
            background:
                linear-gradient(135deg, rgba(255, 255, 255, 0.82), transparent 44%),
                linear-gradient(315deg, rgba(56, 189, 248, 0.16), transparent 36%),
                var(--bg);
        }

        body {
            min-height: 100svh;
            overflow-x: hidden;
            overscroll-behavior: none;
        }

        button,
        input,
        select {
            font: inherit;
        }

        button {
            min-height: 48px;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            background: var(--control);
            color: var(--ink);
            cursor: pointer;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            transition: transform 150ms ease, background 150ms ease, border-color 150ms ease;
        }

        button:active,
        .player-card:active {
            transform: scale(0.985);
        }

        button:focus-visible,
        input:focus-visible,
        select:focus-visible,
        .player-card:focus-visible {
            outline: 3px solid rgba(255, 255, 255, 0.72);
            outline-offset: 3px;
        }

        [data-shortcut] {
            position: relative;
        }

        [data-shortcut]::after {
            content: attr(data-shortcut);
            position: absolute;
            top: -8px;
            right: -8px;
            z-index: 8;
            display: grid;
            place-items: center;
            min-width: 22px;
            height: 22px;
            padding: 0 6px;
            border: 1px solid color-mix(in srgb, var(--warn), white 28%);
            border-radius: 999px;
            background: color-mix(in srgb, var(--warn), black 12%);
            color: #111827;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.34);
            font-size: 12px;
            font-weight: 950;
            line-height: 1;
            opacity: 0;
            pointer-events: none;
            transform: translateY(3px) scale(0.9);
            transition: opacity 120ms ease, transform 120ms ease;
        }

        :root.shortcut-hints-active [data-shortcut]::after {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.45;
        }

        input,
        select {
            min-height: 50px;
            width: 100%;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            background: rgba(255, 255, 255, 0.12);
            color: var(--ink);
            padding: 0 16px;
        }

        input[type="color"] {
            min-width: 74px;
            padding: 8px;
        }

        h1,
        h2,
        h3,
        p {
            margin: 0;
        }

        h1 {
            font-size: clamp(30px, 4.5vw, 58px);
            line-height: 1;
        }

        h2 {
            font-size: 21px;
            line-height: 1.1;
        }

        h3 {
            font-size: 17px;
            line-height: 1.15;
        }

        .shell {
            min-height: 100svh;
            padding:
                max(18px, env(safe-area-inset-top)) max(18px, env(safe-area-inset-right)) max(18px, env(safe-area-inset-bottom)) max(18px, env(safe-area-inset-left));
        }

        .setup-shell,
        .game-shell,
        .summary-shell {
            padding-top: max(2px, env(safe-area-inset-top));
        }

        .glass {
            border: 1px solid var(--line);
            border-radius: var(--radius);
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.15), rgba(255, 255, 255, 0.07));
            box-shadow: var(--shadow);
            backdrop-filter: blur(28px) saturate(1.35);
            -webkit-backdrop-filter: blur(28px) saturate(1.35);
        }

        .setup-bar,
        .session-bar,
        .statistics-bar {
            position: sticky;
            top: max(0px, env(safe-area-inset-top));
            z-index: 55;
            display: grid;
            gap: 16px;
            align-items: center;
            margin-bottom: 16px;
        }

        .setup-bar,
        .statistics-bar {
            grid-template-columns: minmax(220px, 1fr) auto;
        }

        .header-bar {
            grid-template-columns: minmax(150px, 0.74fr) minmax(180px, 1fr) auto;
            align-items: stretch;
            min-height: 62px;
            height: 62px;
            padding: 4px;
            gap: 6px;
            overflow: hidden;
            margin-bottom: 16px;
        }

        .header-bar .brand {
            align-content: center;
            min-height: 52px;
            height: 52px;
            padding: 0 0 0 10px;
            overflow: hidden;
        }

        .header-bar .brand span {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 11px;
        }

        .header-bar .brand,
        .session-bar .brand {
            display: grid;
            grid-template-columns: auto minmax(0, 1fr) auto;
            align-items: center;
            gap: 12px;
            width: 100%;
        }

        .header-bar .brand .app-label,
        .session-bar .brand .app-label {
            grid-column: 1;
            justify-self: start;
        }

        .header-bar .brand .settings-fab,
        .session-bar .brand .settings-fab {
            grid-column: 3;
            justify-self: end;
        }

        .header-bar .brand .app-name,
        .session-bar .brand .app-name {
            color: var(--ink);
            font-size: 21px;
            font-weight: 950;
            line-height: 0.95;
            text-transform: none;
        }

        .header-bar .brand .version-badge,
        .session-bar .brand .version-badge {
            color: var(--ink);
            font-size: 11px;
            font-weight: 900;
            line-height: 1;
            text-transform: none;
        }

        .setup-shell .header-bar .brand,
        .setup-shell .header-bar .nav-status,
        .setup-shell .header-bar .top-actions {
            width: 100%;
        }

        .session-bar .brand {
            align-content: center;
            min-height: 52px;
            height: 52px;
            padding: 0 0 0 10px;
            overflow: hidden;
        }

        .session-bar .brand span {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 11px;
        }

        .session-bar .brand h2 {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 16px;
        }

        .brand .app-label {
            display: grid;
            justify-items: center;
            align-content: center;
            gap: 3px;
            min-width: 0;
            overflow: hidden;
            text-transform: none;
            flex: 0 0 auto;
        }

        .top-actions {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-end;
            gap: 10px;
        }

        .brand {
            display: grid;
            gap: 8px;
        }

        .brand-title {
            display: flex;
            flex-wrap: wrap;
            align-items: flex-end;
            gap: 10px;
        }

        .brand .version-badge {
            display: inline-grid;
            place-items: center;
            justify-self: center;
            min-height: 18px;
            padding: 2px 8px;
            border: 1px solid var(--line-bright);
            border-radius: 999px;
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.08));
            color: var(--ink);
            font-size: 11px;
            font-weight: 900;
            line-height: 1;
            text-transform: none;
            flex: 0 0 auto;
        }

        .setup-shell .setup-bar.header-bar,
        .summary-shell .statistics-bar.header-bar {
            grid-template-columns: minmax(150px, 1.0fr) minmax(300px, 2.0fr) minmax(150px, 1.0fr);
            gap: 20px;
        }

        .header-bar .nav-status {
            display: grid;
            align-content: center;
            justify-items: center;
            min-width: 0;
            min-height: 52px;
            height: 52px;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            background: rgba(255, 255, 255, 0.1);
            text-align: center;
            overflow: hidden;
        }

        .setup-game-toggle {
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .header-bar .nav-status>.label {
            color: var(--ink);
            font-size: 18px;
            font-weight: 950;
            line-height: 1.05;
            text-transform: none;
        }

        .header-bar .nav-status strong {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 18px;
            line-height: 1.05;
        }

        .header-bar .nav-status .range-note {
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 12px;
            line-height: 1.2;
        }

        .header-bar .top-actions,
        .header-bar .summary-actions {
            flex-wrap: nowrap;
            align-items: stretch;
            height: 52px;
        }

        .header-bar .action-btn {
            min-height: 52px;
            height: 52px;
            padding: 0 14px;
        }

        .summary-shell .summary-actions {
            justify-content: flex-end;
        }

        .setup-shell .header-bar .top-actions {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        .setup-shell .header-bar .top-actions .action-btn {
            flex: 0 1 auto;
            flex-basis: auto;
            width: 100%;
            min-width: 0;
            padding: 0 6px;
            justify-content: center;
        }

        .brand span,
        .label,
        .subtle {
            color: var(--muted);
            font-size: 14px;
            font-weight: 650;
            text-transform: uppercase;
        }

        .setup-grid {
            display: grid;
            grid-template-columns: minmax(150px, 1.0fr) minmax(300px, 2.0fr) minmax(150px, 1.0fr);
            gap: 16px;
            align-items: start;
        }

        .setup-stack {
            display: grid;
            gap: 16px;
        }

        .panel {
            padding: 16px;
        }

        .section-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 4px;
        }

        .section-head h2 {
            overflow-wrap: normal;
        }

        .section-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: flex-end;
        }

        .game-panel {
            display: grid;
            gap: 4px;
        }

        .game-panel input,
        .game-panel select {
            height: 32px;
            min-height: 32px;
            max-height: 32px;
        }

        .game-collapse-btn {
            display: none;
            place-items: center;
            width: 32px;
            min-width: 32px;
            max-width: 32px;
            height: 32px;
            min-height: 32px;
            max-height: 32px;
            padding: 0;
            aspect-ratio: 1;
            font-size: 12px;
            font-weight: 950;
            line-height: 1;
            text-align: center;
        }

        .game-list {
            --game-option-height: 90px;
            display: grid;
            gap: 8px;
            align-content: start;
            grid-auto-rows: var(--game-option-height);
            max-height: calc(100svh - 180px);
            overflow: auto;
            padding-right: 2px;
            -webkit-overflow-scrolling: touch;
        }

        .game-option {
            display: grid;
            align-items: start;
            grid-template-rows: minmax(0, 1fr) 14px;
            height: var(--game-option-height);
            min-height: var(--game-option-height);
            max-height: var(--game-option-height);
            padding: 8px;
            text-align: left;
            overflow: hidden;
        }

        .game-option>span:first-child {
            min-height: 0;
            overflow: hidden;
        }

        .game-option[aria-pressed="true"] {
            background: var(--control-active);
            border-color: var(--line-bright);
        }

        .game-option strong {
            display: block;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 17px;
        }

        .game-option-title {
            display: flex !important;
            align-items: center;
            gap: 6px;
            min-width: 0;
        }

        .game-title-line {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            min-width: 0;
            max-width: 100%;
            vertical-align: middle;
        }

        .game-title-name {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .game-year-tag {
            flex: 0 0 auto;
            min-height: 18px;
            padding: 3px 6px;
            border: 1px solid var(--line);
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.12);
            color: var(--muted);
            font-size: 11px;
            font-weight: 950;
            line-height: 1;
        }

        .turn-order-badge,
        .other-timing-badge,
        .faction-badge,
        .verified-badge {
            --tag-accent: var(--line-bright);
            display: inline-grid;
            place-items: center;
            flex: 0 0 auto;
            min-width: 20px;
            height: 20px;
            padding: 0 5px;
            border: 1px solid color-mix(in srgb, var(--tag-accent), white 24%);
            border-radius: 999px;
            background: color-mix(in srgb, var(--tag-accent), transparent 78%);
            color: var(--ink);
            font-size: 12px;
            font-weight: 950;
            line-height: 1;
        }

        .turn-order-badge {
            --tag-accent: var(--warn);
        }

        .faction-badge {
            --tag-accent: var(--info);
        }

        .other-timing-badge {
            --tag-accent: var(--muted);
        }

        .verified-badge {
            --tag-accent: var(--good);
            min-width: 20px;
            padding: 0;
        }

        .game-option .game-title-line,
        .header-bar .nav-status>.game-title-line {
            width: 100%;
        }

        .game-option-title .game-title-line {
            flex: 1 1 auto;
            width: auto;
        }

        .header-bar .nav-status>.game-title-line {
            justify-content: center;
        }

        .game-option .game-year-tag {
            min-height: 16px;
            padding: 2px 5px;
            font-size: 10px;
        }

        .game-option small,
        .range-note {
            color: var(--muted);
            font-size: 12px;
            font-weight: 750;
            line-height: 1.25;
            letter-spacing: 0;
            white-space: pre-wrap;
        }

        .game-option small {
            display: -webkit-box;
            overflow: hidden;
            -webkit-box-orient: vertical;
            -webkit-line-clamp: 2;
            line-clamp: 2;
        }

        :root[data-text-type="text"] .range-note {
            line-height: 1.25;
        }

        :root[data-text-type="emoji"] .range-note {
            line-height: 1.5;
        }

        .label-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin: 5px 0 5px;
        }

        .selection-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            min-height: 32px;
            padding: 0px 10px;
            border: 1px solid color-mix(in srgb, var(--accent), white 28%);
            border-radius: var(--radius);
            background: color-mix(in srgb, var(--accent), transparent 86%);
            font-size: 14px;
            font-weight: 850;
            white-space: nowrap;
        }

        .preset-grid,
        .chip-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
        }

        .name-bank-grid {
            grid-template-columns: repeat(4, minmax(0, 1fr));
        }

        .preset-btn,
        .chip-btn,
        .action-btn,
        .icon-btn {
            display: inline-grid;
            place-items: center;
            gap: 7px;
            padding: 10px 14px;
            font-weight: 800;
        }

        .name-bank-grid .chip-btn {
            min-width: 0;
            padding: 8px 6px;
            overflow-wrap: anywhere;
            font-size: 14px;
            line-height: 1.05;
        }

        .name-chip {
            grid-template-columns: 15px minmax(0, 1fr);
            justify-items: start;
            align-items: center;
            border-color: color-mix(in srgb, var(--accent), white 30%);
            background:
                linear-gradient(90deg, color-mix(in srgb, var(--accent), transparent 76%), rgba(255, 255, 255, 0.09));
            text-align: left;
        }

        .name-chip span:last-child {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .mini-dot {
            width: 15px;
            height: 15px;
            border: 1px solid rgba(255, 255, 255, 0.58);
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 14px color-mix(in srgb, var(--accent), transparent 28%);
        }

        .action-btn {
            grid-auto-flow: column;
            justify-content: center;
            height: 52px;
            min-height: 52px;
            max-height: 52px;
            min-width: 100px;
        }

        .preset-btn[aria-pressed="true"],
        .chip-btn:hover,
        .action-btn:hover,
        .game-collapse-btn:hover,
        .icon-btn:hover {
            background: var(--control-active);
            border-color: var(--line-bright);
        }

        .preset-btn {
            align-content: center;
            min-height: 96px;
        }

        .preset-name {
            font-size: 18px;
        }

        .swatches {
            display: flex;
            gap: 6px;
            justify-content: center;
        }

        .game-option .swatches {
            gap: 3px;
            justify-content: flex-start;
            height: 12px;
            max-height: 12px;
            max-width: 100%;
            overflow: hidden;
            flex-wrap: nowrap;
        }

        .game-option-preview {
            display: flex;
            align-items: center;
            gap: 6px;
            min-width: 0;
            height: 12px;
            overflow: hidden;
        }

        .game-option-preview .swatches {
            flex: 1 1 auto;
            min-width: 0;
        }

        .game-option-preview .verified-badge {
            min-width: 12px;
            width: 12px;
            height: 12px;
            padding: 0;
            font-size: 9px;
        }

        .game-option .swatch {
            width: 12px;
            height: 12px;
            flex: 0 0 auto;
            box-shadow: none;
        }

        .swatch {
            width: 22px;
            height: 22px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            background: var(--swatch);
            box-shadow: 0 0 18px color-mix(in srgb, var(--swatch), transparent 35%);
        }

        .swatch.is-rainbow {
            background: conic-gradient(#ef4444, #f97316, #facc15, #22c55e, #38bdf8, #8b5cf6, #ec4899, #ef4444);
        }

        .swatch-count {
            display: inline-grid;
            place-items: center;
            min-width: 30px;
            height: 18px;
            padding: 0 6px;
            border: 1px solid rgba(255, 255, 255, 0.34);
            border-radius: 999px;
            color: var(--muted);
            font-size: 11px;
            font-weight: 850;
        }

        .color-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 8px;
        }

        .player-add-body {
            display: grid;
            gap: 4px;
        }

        .player-add-column {
            min-width: 0;
        }

        .other-color-grid {
            grid-template-columns: repeat(4, minmax(0, 1fr));
        }

        .color-btn {
            display: grid;
            grid-template-columns: 20px minmax(0, 1fr);
            gap: 7px;
            align-items: center;
            min-height: 52px;
            padding: 8px 9px;
            text-align: left;
            font-size: 13px;
            font-weight: 850;
            overflow: hidden;
        }

        .color-btn[aria-pressed="true"] {
            background: var(--control-active);
            border-color: color-mix(in srgb, var(--swatch), white 35%);
            box-shadow: 0 0 0 1px color-mix(in srgb, var(--swatch), transparent 32%);
        }

        .color-btn.is-rainbow[aria-pressed="true"] {
            border-color: rgba(255, 255, 255, 0.7);
            box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.34);
        }

        .color-dot {
            width: 20px;
            height: 20px;
            border: 1px solid rgba(255, 255, 255, 0.55);
            border-radius: 50%;
            background: var(--swatch);
            box-shadow: 0 0 16px color-mix(in srgb, var(--swatch), transparent 28%);
        }

        .color-btn.is-rainbow .color-dot,
        .selection-pill.is-rainbow .dot {
            background: conic-gradient(#ef4444, #f97316, #facc15, #22c55e, #38bdf8, #8b5cf6, #ec4899, #ef4444);
            box-shadow: 0 0 18px rgba(255, 255, 255, 0.34);
        }

            border: 1px solid color-mix(in srgb, var(--accent), white 18%);
            border-radius: 999px;

                linear-gradient(90deg, color-mix(in srgb, var(--accent), transparent 96%), rgba(255, 255, 255, 0.04)),
                rgba(0, 0, 0, 0.18);

        .timeline-segment {
            position: absolute;
            left: var(--start);
            top: 0;
            width: var(--width);
            min-width: 3px;
            height: 100%;
            overflow: hidden;
            border-radius: 999px;
            border: 1px solid color-mix(in srgb, var(--accent), white 34%);
            background:
                linear-gradient(160deg, color-mix(in srgb, var(--accent), white 16%), color-mix(in srgb, var(--accent), black 12%));
            box-shadow: 0 0 18px color-mix(in srgb, var(--accent), transparent 54%);
            color: #fff;

        .timeline-segment.is-setup {
            background:
                linear-gradient(160deg, rgba(148, 163, 184, 0.78), rgba(71, 85, 105, 0.8));
        }

        .timeline-segment.is-pause {
            z-index: 2;
            background:
                repeating-linear-gradient(135deg, rgba(0, 0, 0, 0.86) 0 8px, rgba(30, 41, 59, 0.86) 8px 16px);
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.12);

            transform: translateX(-50%);

        .date-toggle[data-mode="dmy"] .date-dmy,
        .date-toggle[data-mode="ymd"] .date-ymd {

            color: var(--ink);

        /* Media: Large is the default layout above 1080px. */
        /* Media: Medium is 1080px and below. */
        @media (max-width: 1080px) {
            .shell {
                padding:
                    max(8px, env(safe-area-inset-top)) max(10px, env(safe-area-inset-right)) max(8px, env(safe-area-inset-bottom)) max(10px, env(safe-area-inset-left));
            }

            .setup-bar,
            .header-bar,
            .session-bar,
            .statistics-bar {
                position: sticky;
                top: max(0px, env(safe-area-inset-top));
                z-index: 55;
                gap: 6px;
                margin-bottom: 8px;
            }

            .game-shell .session-bar.header-bar {
                top: max(0px, env(safe-area-inset-top));
            }

            .settings-fab {
                width: 48px;
                min-width: 48px;
                height: 48px;
                min-height: 48px;
                font-size: 24px;
            }

            .header-bar .brand .app-name,
            .session-bar .brand .app-name,
            .statistics-bar .brand .app-name {
                font-size: 18px;
            }

            .header-bar .action-btn,
            .session-bar .action-btn,
            .statistics-bar .action-btn {
                font-size: 12px;
            }

            .setup-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 10px;
            }

            .setup-shell:not(.game-list-collapsed) .turn-order-panel {
                display: none;
            }

            .setup-stack,
            .roster-list {
                gap: 8px;
            }

            .top-actions {
                display: flex;
                flex-wrap: wrap;
                justify-content: flex-end;
                gap: 5px;
            }

            .panel {
                padding: 10px;
            }

            .section-head {
                margin-bottom: 4px;
            }

            .game-list {
                height: calc(100svh - 150px);
            }

            .game-collapse-btn {
                display: inline-grid;
            }

            .setup-shell.game-list-collapsed .game-panel {
                display: none;
            }

            .game-option {
                height: var(--game-option-height);
                min-height: var(--game-option-height);
                max-height: var(--game-option-height);
            }

            .color-grid,
            .other-color-grid,
            .name-bank-grid,
            .other-name-grid {
                grid-template-columns: repeat(4, minmax(0, 1fr));
                gap: 6px;

            .player-add-panel .color-grid,

                grid-template-columns: repeat(4, minmax(0, 1fr));
            }


            .color-btn,
            .chip-btn,
            .name-bank-grid .chip-btn {
                min-height: 48px;
                font-size: 12px;

                grid-template-columns: minmax(0, 1fr) minmax(132px, auto);

            .metric,
            .current-chip,
            .end-btn {

                min-height: 48px;
            }

            .players-grid {
                grid-template-columns: repeat(var(--player-cols, 3), minmax(0, 1fr)) !important;
            }

            .player-card {
                grid-template-rows: auto auto auto minmax(42px, 1fr);
                min-height: 0;
                padding: 9px;
                gap: 7px;
            }

            .players-grid.is-insightful .player-card {
                grid-template-rows: auto minmax(44px, 0.7fr) auto;
                min-height: 0;
                padding: 8px;
                gap: 6px;

                min-height: 0;
                padding: 8px;
                gap: 6px;

            .player-head {

            }

            .player-name {

            .live-time {

                padding: 3px 5px;

            .turn-list {
                max-height: 74px;
            }

            .metric strong {
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;

            .session-bar .metric .label {

            .session-bottom-actions .pause-btn,
            .session-bottom-actions .advance-btn {
                height: 52px;
                min-height: 52px;
                max-height: 52px;
                font-size: 20px;

            .kpi-row {
                grid-template-columns: repeat(5, minmax(0, 1fr));

                margin-bottom: 8px;

            .kpi {
                min-height: 52px;

        @media (max-width: 720px) {

                grid-template-columns: 1fr;
            }

            .setup-shell:not(.game-list-collapsed) .turn-order-panel {
                display: block;

                customValue,

                    return this.customValue || NAMED_COLORS[this.namedColor] || this.namedColor;
                }
            };
        }

        function markdownInline(value) {
            return esc(value)
                .replace(/`([^`]+)`/g, "<code>$1</code>")
                .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
        }

        function renderMarkdown(markdown) {
            const lines = String(markdown).split(/\r?\n/);
            let html = "";
            let paragraph = [];
            let inList = false;

            function flushParagraph() {
                if (!paragraph.length) return;
                html += `<p>${paragraph.map(markdownInline).join("<br>")}</p>`;
                paragraph = [];
            }

            function closeList() {
                if (!inList) return;
                html += "</ul>";
                inList = false;
            }

            lines.forEach(rawLine => {
                const line = rawLine.trim();
                if (!line) {
                    flushParagraph();
                    closeList();
                    return;
                }

                const heading = line.match(/^#{1,4}\s+(.+)$/);
                if (heading) {
                    flushParagraph();
                    closeList();
                    html += `<h4>${markdownInline(heading[1])}</h4>`;
                    return;
                }

                const bullet = line.match(/^[-*]\s+(.+)$/);
                if (bullet) {
                    flushParagraph();
                    if (!inList) {
                        html += "<ul>";
                        inList = true;
                    }
                    html += `<li>${markdownInline(bullet[1])}</li>`;
                    return;
                }

                paragraph.push(line);
            });

            flushParagraph();
            closeList();
            return html;
        }

        function currentPreset() {
            return GAME_PRESETS.find(game => game.id === selectedGameId) || GAME_PRESETS[0];
        }

        function turnOrderRuleForGame(game = currentPreset()) {
            return game?.turnOrder || null;
        }

        function turnOrderBadgeLabel(rule = turnOrderRuleForGame()) {
            return rule?.label || "Turn order rule";
        }

        function turnOrderSearchText(game) {
            const rule = turnOrderRuleForGame(game);
            if (!rule) return "";
            return [
                "turn order",
                rule.label,
                rule.note,
                rule.firstMode,
                ...(rule.defaultOthers || [])
            ].filter(Boolean).join(" ");
        }

        function defaultOtherTimingNames(game = currentPreset()) {
            return turnOrderRuleForGame(game)?.defaultOthers || [];
        }

        function hasDefaultOtherTiming(game = currentPreset()) {
            return defaultOtherTimingNames(game).length > 0;
        }

        function usesOpenColorPool(game = currentPreset()) {
            return Boolean(game?.openColorPool || !game?.colors?.length);
        }

        function colorsForGame(game = currentPreset()) {
            const colors = usesOpenColorPool(game) ? STANDARD_COLORS : game.colors;
            return colors.map(color => typeof color === "string" ? { name: color, value: color } : color);
        }

        function selectedGameColors() {
            const colors = colorsForGame();
            return colors.length ? colors : STANDARD_COLORS;
        }

        function playerColorOptions(colors = selectedGameColors()) {
            const options = colors.filter(color => color.name.toLowerCase() !== "silver");
            return hasKnownColorOptions(options) ? options : [...options, QUICK_COLOR_OPTION];
        }

        function colorName(value, colors = selectedGameColors()) {
            if (value === PLAYER_QUICK_COLOR) return QUICK_COLOR_OPTION.name;
            return (colors.find(color => color.value === value) || STANDARD_COLORS.find(color => color.value === value) || { name: "Custom" }).name;
        }

        function isNamedColorLabel(name) {
            const normalized = String(name || "").toLowerCase();
            return Object.keys(NAMED_COLORS).some(key => key.toLowerCase() === normalized);
        }

        function isFactionColorOption(color) {
            return Boolean(color && color.value !== PLAYER_QUICK_COLOR && !isNamedColorLabel(color.name));
        }

        function hasFactionColorOptions(colors = selectedGameColors()) {
            return colors.some(isFactionColorOption);
        }

        function hasKnownColorOptions() {
            return hasFactionColorOptions() || !usesOpenColorPool(currentPreset());
        }

        function factionNameForSelection(colorValue = selectedPlayerColor) {
            if (colorValue === PLAYER_QUICK_COLOR) return "";
            const option = playerColorOptions().find(color => color.value === colorValue);
            return isFactionColorOption(option) ? option.name : "";
        }

        function displayNameParts(entity) {
            const playerName = (entity?.name || "").trim() || "Unnamed";
            const factionName = (entity?.factionName || "").trim();
            if (factionName && displayNameMode === "faction") {
                return { primary: factionName, secondary: playerName };
            }
            return { primary: playerName, secondary: factionName };
        }

        function displayNameText(entity) {
            const names = displayNameParts(entity);
            return names.secondary ? `${names.primary}, ${names.secondary}` : names.primary;
        }

        function appVersion() {
            return CHANGELOG[0]?.version || "1.0.0";
        }

        function randomInteger(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        function shuffled(values) {
            const copy = values.slice();
            for (let index = copy.length - 1; index > 0; index -= 1) {
                const swapIndex = Math.floor(Math.random() * (index + 1));
                [copy[index], copy[swapIndex]] = [copy[swapIndex], copy[index]];
            }
            return copy;
        }

        function colorValueByName(name) {
            const colors = selectedGameColors();
            const normalized = name.toLowerCase();
            const match = colors.find(color => color.name.toLowerCase() === normalized)
                || STANDARD_COLORS.find(color => color.name.toLowerCase() === normalized);
            if (match) return match.value;
            const namedKey = Object.keys(NAMED_COLORS).find(key => key.toLowerCase() === normalized);
            if (namedKey) return NAMED_COLORS[namedKey];
            return selectedGameColors()[0]?.value || FALLBACK_COLORS[0];
        }

        function quickPlayerColor(preference) {
            const choices = Array.isArray(preference) ? preference : [preference];
            const colors = selectedGameColors();
            const gameMatch = choices
                .map(choice => colors.find(color => color.name.toLowerCase() === choice.toLowerCase()))
                .find(Boolean);
            return gameMatch ? gameMatch.value : colorValueByName(choices[0]);
        }

        function playerColorForName(name) {
            if (selectedPlayerColor !== PLAYER_QUICK_COLOR) return selectedPlayerColor;
            const quick = QUICK_PLAYERS.find(player => player.name.toLowerCase() === name.toLowerCase());
            return quick ? quickPlayerColor(quick.color) : colorForIndex(setupEntries.filter(entry => entry.type === "player").length);
        }

        function colorForIndex(index) {
            const colors = selectedGameColors();
            return colors[index % colors.length]?.value || FALLBACK_COLORS[index % FALLBACK_COLORS.length];
        }

        function realSetupPlayerCount() {
            return setupEntries.filter(entry => entry.type === "player" && entry.name.trim()).length;
        }

        function isRuleLookupEntry(entry) {
            return Boolean(entry && entry.type === "other" && entry.name.trim().toLowerCase() === RULE_LOOKUP_NAME.toLowerCase());
        }

        function isTurnOrderDefaultEntry(entry) {
            return Boolean(entry?.turnOrderDefault);
        }

        function normalizeRuleLookupEntry(entry, isDefault = entry.ruleLookupDefault !== false) {
            entry.locked = true;
            entry.name = RULE_LOOKUP_NAME;
            entry.type = "other";
            entry.color = NAMED_COLORS.White;
            entry.factionName = "";
            entry.ruleLookupDefault = Boolean(isDefault);
            entry.turnOrderDefault = false;
            return entry;
        }

        function defaultOtherColorForName(name) {
            const normalized = String(name || "").toLowerCase();
            if (normalized === RULE_LOOKUP_NAME.toLowerCase()) return NAMED_COLORS.White;
            return OTHER_COLORS.find(color => color.name === "Gray")?.value || selectedOtherColor;
        }

        function syncTurnOrderDefaultOthers(game = currentPreset()) {
            const rule = turnOrderRuleForGame(game);
            const defaultNames = new Set((rule?.defaultOthers || []).map(name => name.toLowerCase()));
            setupEntries = setupEntries.filter(entry => {
                if (!isTurnOrderDefaultEntry(entry)) return true;
                return defaultNames.has(entry.name.trim().toLowerCase());
            });
            (rule?.defaultOthers || []).forEach(name => {
                const exists = setupEntries.some(entry =>
                    entry.type === "other" && entry.name.trim().toLowerCase() === name.toLowerCase()
                );
                if (exists) return;
                const entry = addEntry(name, "other", defaultOtherColorForName(name), false, "", false);
                entry.turnOrderDefault = true;
            });
        }

        function turnOrderRankForEntry(entry, game = currentPreset()) {
            const colors = colorsForGame(game);
            const normalizedFaction = String(entry.factionName || "").toLowerCase();
            const colorIndex = colors.findIndex(color =>
                (normalizedFaction && color.name.toLowerCase() === normalizedFaction) ||
                color.value === entry.color
            );
            return colorIndex >= 0 ? colorIndex : Number.MAX_SAFE_INTEGER;
        }

        function orderedPlayersByTurnRule(players, game = currentPreset()) {
            return players
                .map((entry, index) => ({ entry, index, rank: turnOrderRankForEntry(entry, game) }))
                .sort((a, b) => a.rank - b.rank || a.index - b.index)
                .map(item => item.entry);
        }

        function sortSetupPlayersByTurnRule(game = currentPreset()) {
            const players = setupEntries.filter(entry => entry.type === "player");
            const others = setupEntries.filter(entry => entry.type !== "player");
            setupEntries = [...orderedPlayersByTurnRule(players, game), ...others];
        }

        function applyGameTurnOrderDefaults({ sortPlayers = true, syncOthers = true } = {}) {
            const game = currentPreset();
            const rule = turnOrderRuleForGame(game);
            if (syncOthers) syncTurnOrderDefaultOthers(game);
            if (sortPlayers && rule?.autoSortFactions && !turnOrderManuallyAdjusted) {
                sortSetupPlayersByTurnRule(game);
            }
        }

        function firstPlayerByTurnRule(realPlayers, game = currentPreset()) {
            const rule = turnOrderRuleForGame(game);
            if (!rule) return null;
            if (rule.firstMode === "faction-order") {
                if (!turnOrderManuallyAdjusted) return orderedPlayersByTurnRule(realPlayers, game)[0] || null;
                return realPlayers[0] || null;
            }
            if (rule.firstMode === "current-order") {
                return realPlayers[0] || null;
            }
            return null;
        }

        function ensureRuleLookup() {
            const existing = setupEntries.find(isRuleLookupEntry);
            const playerCount = realSetupPlayerCount();

            if (playerCount >= RULE_LOOKUP_PLAYER_LIMIT) {
                setupEntries = setupEntries.filter(entry => !isRuleLookupEntry(entry) || entry.ruleLookupDefault === false);
                const manual = setupEntries.find(isRuleLookupEntry);
                return manual ? normalizeRuleLookupEntry(manual, false) : null;
            }

            if (existing) {
                setupEntries = setupEntries.filter(entry => !isRuleLookupEntry(entry) || entry.id === existing.id);
                return normalizeRuleLookupEntry(existing, existing.ruleLookupDefault !== false);
            }

            const entry = {
                id: uid(),
                name: RULE_LOOKUP_NAME,
                type: "other",
                color: NAMED_COLORS.White,
                locked: true,
                factionName: "",
                ruleLookupDefault: true,
                turnOrderDefault: false
            };
            setupEntries.push(entry);
            return entry;
        }

        function addEntry(name = "", type = "player", color = colorForIndex(setupEntries.filter(entry => entry.type === "player").length), locked = false, factionName = "", ruleLookupDefault = false) {
            const entry = {
                id: uid(),
                name,
                type,
                color,
                locked,
                factionName: type === "player" ? factionName : "",
                ruleLookupDefault,
                turnOrderDefault: false
            };
            setupEntries.push(entry);
            return entry;
        }

        function addName(name, color = playerColorForName(name), factionName = factionNameForSelection()) {
            const exists = setupEntries.some(entry => entry.name.trim().toLowerCase() === name.toLowerCase());
            if (!exists) addEntry(name, "player", color, false, factionName);
            applyGameTurnOrderDefaults({ syncOthers: false });
            selectedStarterId = null;
            render();
        }

        function addAllNames() {
            PRESET_NAMES.forEach(name => {
                if (!setupEntries.some(entry => entry.name.trim().toLowerCase() === name.toLowerCase())) {
                    addEntry(name, "player", colorForIndex(setupEntries.filter(entry => entry.type === "player").length));
                }
            });
            applyGameTurnOrderDefaults({ syncOthers: false });
            selectedStarterId = null;
            render();
        }

        function addOther(name = "Bidding") {
            const exists = setupEntries.some(entry => entry.type === "other" && entry.name.trim().toLowerCase() === name.toLowerCase());
            if (exists) return;
            const isRuleLookup = name.toLowerCase() === RULE_LOOKUP_NAME.toLowerCase();
            const entry = addEntry(name, "other", isRuleLookup ? NAMED_COLORS.White : selectedOtherColor, isRuleLookup, "", false);
            selectedStarterId = null;
            render();
            requestAnimationFrame(() => {
                const input = document.querySelector(`input[data-id="${entry.id}"][data-field="name"]`);
                if (input) input.focus();
            });
        }

        function randomizeColorsForGame(game) {
            return playerColorOptions(colorsForGame(game)).filter(color => color.value !== PLAYER_QUICK_COLOR);
        }

        function randomPlayerCountForGame(game, colors) {
            const maxPlayers = Math.min(game.maxPlayers, PRESET_NAMES.length, colors.length);
            const minPlayers = Math.min(game.minPlayers, maxPlayers);
            return maxPlayers > 0 ? randomInteger(minPlayers, maxPlayers) : 0;
        }

        function randomizePlayersForGame(game) {
            const colors = shuffled(randomizeColorsForGame(game));
            const playerCount = randomPlayerCountForGame(game, colors);
            if (!playerCount) return;
            const names = shuffled(PRESET_NAMES).slice(0, playerCount);

            selectedGameId = game.id;
            state.gameName = game.name;
            gameSearch = "";
            isGameListCollapsed = true;
            selectedPlayerColor = PLAYER_QUICK_COLOR;
            selectedOtherColor = OTHER_COLORS.find(color => color.name === "Gray").value;
            selectedStarterId = null;
            setupEntries = [];

            names.forEach((name, index) => {
                const color = colors[index];
                addEntry(name, "player", color.value, false, isFactionColorOption(color) ? color.name : "");
            });
            turnOrderManuallyAdjusted = false;
            ensureRuleLookup();
            applyGameTurnOrderDefaults();
            render();
        }

        function randomizeSetup() {
            const games = GAME_PRESETS
                .filter(game => game.id !== "custom")
                .filter(game => randomizeColorsForGame(game).length >= Math.min(game.minPlayers, PRESET_NAMES.length));
            const game = games[randomInteger(0, games.length - 1)];
            randomizePlayersForGame(game);
        }

        function randomizeSelectedGame() {
            randomizePlayersForGame(currentPreset());
        }

        function applyGamePreset(gameId) {
            const isSwitchingGames = gameId !== selectedGameId;
            selectedGameId = gameId;
            state.gameName = currentPreset().name;
            selectedPlayerColor = PLAYER_QUICK_COLOR;
            isGameListCollapsed = true;
            if (isSwitchingGames) {
                setupEntries = setupEntries.filter(entry => entry.type !== "player");
                turnOrderManuallyAdjusted = false;
                selectedStarterId = null;
                ensureRuleLookup();
            }
            applyGameTurnOrderDefaults({ sortPlayers: false });
            render();
        }

        function clearTurnOrder() {
            setupEntries = setupEntries.filter(entry => entry.type !== "player");
            turnOrderManuallyAdjusted = false;
            selectedStarterId = null;
            ensureRuleLookup();
            applyGameTurnOrderDefaults({ sortPlayers: false });
            render();
        }

        function resetStartPage() {
            selectedGameId = TEST_DEFAULT_GAME_ID;
            state.gameName = currentPreset().name;
            gameSearch = "";
            isGameListCollapsed = true;
            selectedPlayerColor = PLAYER_QUICK_COLOR;
            selectedOtherColor = OTHER_COLORS.find(color => color.name === "Gray").value;
            selectedStarterId = null;
            setupEntries = [];
            turnOrderManuallyAdjusted = false;
            ensureRuleLookup();
            applyGameTurnOrderDefaults({ sortPlayers: false });
            render();
        }

        function removeEntry(id) {
            const entry = setupEntries.find(item => item.id === id);
            if (entry?.locked) return;
            setupEntries = setupEntries.filter(entry => entry.id !== id);
            ensureRuleLookup();
            if (selectedStarterId === id) selectedStarterId = null;
            render();
        }

        function updateEntry(id, patch) {
            const entry = setupEntries.find(item => item.id === id);
            if (!entry) return;
            if (entry.locked) {
                if (patch.color) entry.color = patch.color;
                return;
            }
            Object.assign(entry, patch);
        }

        function pickFirstPlayer() {
            const realPlayers = setupEntries.filter(entry => entry.type === "player" && entry.name.trim());
            if (!realPlayers.length) return;
            const picked = firstPlayerByTurnRule(realPlayers) || realPlayers[Math.floor(Math.random() * realPlayers.length)];
            const index = setupEntries.findIndex(entry => entry.id === picked.id);
            if (index > 0) {
                setupEntries = setupEntries.slice(index).concat(setupEntries.slice(0, index));
            }
            selectedStarterId = picked.id;
            render();
        }

        function startGame() {
            applyGameTurnOrderDefaults({ syncOthers: false });
            ensureRuleLookup();
            const realPlayers = setupEntries.filter(entry => entry.type === "player" && entry.name.trim());
            if (!realPlayers.length) return;

            const orderedEntries = [
                ...setupEntries.filter(entry => entry.type === "player"),
                ...setupEntries.filter(entry => entry.type === "other")
            ];
            const players = orderedEntries
                .filter(entry => entry.name.trim())
                .map(entry => ({
                    id: entry.id,
                    name: entry.name.trim(),
                    type: entry.type,
                    color: entry.color,
                    factionName: entry.factionName || "",
                    ruleLookupDefault: entry.ruleLookupDefault || false,
                    turnOrderDefault: entry.turnOrderDefault || false,
                    placement: "",
                    turns: []
                }));

            state = {
                view: "game",
                gameName: currentPreset().name,
                players,
                activeId: null,
                activeTurnStartedAt: null,
                currentStartedAt: null,
                currentElapsed: 0,
                isPaused: false,
                pauseStartedAt: null,
                pauses: [],
                gameStartedAt: Date.now(),
                firstTurnStartedAt: null,
                setupElapsed: 0,
                gameEndedAt: null
            };
            render();
        }

        function getPlayer(id) {
            return state.players.find(player => player.id === id);
        }

        function activeElapsed(now = Date.now()) {
            if (!state.activeId) return 0;
            const running = !state.isPaused && state.currentStartedAt ? now - state.currentStartedAt : 0;
            return state.currentElapsed + running;
        }

        function pauseTotal(now = Date.now()) {
            const recorded = state.pauses.reduce((total, pause) => total + pause.duration, 0);
            return recorded + (state.isPaused && state.pauseStartedAt ? now - state.pauseStartedAt : 0);
        }

        function setupTotal(now = Date.now()) {
            if (!state.gameStartedAt) return 0;
            if (state.firstTurnStartedAt) return state.setupElapsed;
            const end = state.gameEndedAt || now;
            return Math.max(0, end - state.gameStartedAt);
        }

        function markFirstTurnStarted(now = Date.now()) {
            if (state.firstTurnStartedAt || !state.gameStartedAt) return;
            state.firstTurnStartedAt = now;
            state.setupElapsed = Math.max(0, now - state.gameStartedAt);
        }

        function beginPause(now = Date.now()) {
            if (state.isPaused) return;
            if (state.activeId && state.currentStartedAt) {
                state.currentElapsed += now - state.currentStartedAt;
                state.currentStartedAt = null;
            }
            state.isPaused = true;
            state.pauseStartedAt = now;
            render();
        }

        function endPause(now = Date.now(), resumeActive = true) {
            if (!state.isPaused) return;
            state.pauses.push({
                start: state.pauseStartedAt,
                end: now,
                duration: Math.max(0, now - state.pauseStartedAt)
            });
            state.isPaused = false;
            state.pauseStartedAt = null;
            if (resumeActive && state.activeId) {
                state.currentStartedAt = now;
            }
        }

        function togglePause() {
            const now = Date.now();
            if (state.isPaused) {
                endPause(now, true);
                render();
            } else {
                beginPause(now);
            }
        }

        function finishCurrentTurn(now = Date.now()) {
            if (!state.activeId) return;
            if (state.isPaused) endPause(now, false);
            const player = getPlayer(state.activeId);
            const elapsed = activeElapsed(now);
            if (player && elapsed >= 0) {
                player.turns.push({
                    startedAt: state.activeTurnStartedAt || Math.max(state.gameStartedAt || now, now - elapsed),
                    duration: elapsed,
                    endedAt: now
                });
            }
            state.activeId = null;
            state.activeTurnStartedAt = null;
            state.currentStartedAt = null;
            state.currentElapsed = 0;
        }

        function startTurn(id) {
            const now = Date.now();
            if (state.activeId === id) {
                togglePause();
                return;
            }
            if (state.activeId) finishCurrentTurn(now);
            if (state.isPaused) endPause(now, false);
            markFirstTurnStarted(now);
            state.activeId = id;
            state.activeTurnStartedAt = now;
            state.currentElapsed = 0;
            state.currentStartedAt = now;
            render();
        }

        function autoAdvance() {
            const turnPlayers = state.players.filter(player => player.type === "player");
            if (!turnPlayers.length) return;
            const now = Date.now();
            const activeIndex = turnPlayers.findIndex(player => player.id === state.activeId);
            if (state.activeId) finishCurrentTurn(now);
            if (state.isPaused) endPause(now, false);
            const nextIndex = activeIndex >= 0 ? (activeIndex + 1) % turnPlayers.length : 0;
            const next = turnPlayers[nextIndex];
            markFirstTurnStarted(now);
            state.activeId = next.id;
            state.activeTurnStartedAt = now;
            state.currentElapsed = 0;
            state.currentStartedAt = now;
            render();
        }

        function endGame() {
            const now = Date.now();
            if (state.isPaused) endPause(now, false);
            if (state.activeId) finishCurrentTurn(now);
            state.gameEndedAt = now;
            state.view = "summary";
            render();
        }

        function resetToSetup() {
            if (state.players.length) {
                setupEntries = state.players.map((player, index) => ({
                    id: player.id || uid(),
                    name: player.name,
                    type: player.type,
                    color: player.color || colorForIndex(index),
                    locked: player.type === "other" && player.name.trim().toLowerCase() === RULE_LOOKUP_NAME.toLowerCase(),
                    factionName: player.factionName || "",
                    ruleLookupDefault: player.ruleLookupDefault || false,
                    turnOrderDefault: player.turnOrderDefault || false
                }));
            }
            ensureRuleLookup();
            applyGameTurnOrderDefaults({ sortPlayers: false });
            selectedStarterId = null;
            isGameListCollapsed = true;
            state = {
                view: "setup",
                gameName: currentPreset().name,
                players: [],
                activeId: null,
                activeTurnStartedAt: null,
                currentStartedAt: null,
                currentElapsed: 0,
                isPaused: false,
                pauseStartedAt: null,
                pauses: [],
                gameStartedAt: null,
                firstTurnStartedAt: null,
                setupElapsed: 0,
                gameEndedAt: null
            };
            render();
        }

        function isEditableTarget(target) {
            return Boolean(target?.closest?.("input, textarea, select, [contenteditable='true']"));
        }

        function isShortcutHintChord(event) {
            return Boolean(event.shiftKey && event.ctrlKey && event.altKey);
        }

        function setShortcutHintsActive(active) {
            if (shortcutHintsActive === active) return;
            shortcutHintsActive = active;
            document.documentElement.classList.toggle("shortcut-hints-active", active);
        }

        function shortcutScope() {
            return isSettingsOpen ? app.querySelector(".settings-overlay") || app : app;
        }

        function isVisibleShortcutTarget(element) {
            if (!element || element.disabled) return false;
            const rect = element.getBoundingClientRect();
            return rect.width > 0 && rect.height > 0;
        }

        function activateShortcutTarget(key) {
            const normalized = String(key || "").toLowerCase();
            if (!normalized || normalized.length !== 1) return false;
            const target = Array.from(shortcutScope().querySelectorAll("[data-shortcut]"))
                .find(element => String(element.dataset.shortcut || "").toLowerCase() === normalized && isVisibleShortcutTarget(element));
            if (!target) return false;
            target.click();
            return true;
        }

        function handleShortcutHintHotkeys(event) {
            const chordActive = isShortcutHintChord(event);
            setShortcutHintsActive(chordActive);
            if (!chordActive) return false;
            const key = event.key.toLowerCase();
            if (["shift", "control", "alt", "option"].includes(key)) return false;
            if (!activateShortcutTarget(key)) return false;
            event.preventDefault();
            return true;
        }

        function handleShortcutHintKeyup(event) {
            setShortcutHintsActive(isShortcutHintChord(event));
        }

        function ensureTestingSetupPlayers() {
            ensureRuleLookup();
            if (setupEntries.some(entry => entry.type === "player" && entry.name.trim())) return;

            const game = currentPreset();
            const colors = randomizeColorsForGame(game);
            const fallbackColors = selectedGameColors();
            const playerCount = Math.min(
                Math.max(game.minPlayers || 2, 2),
                PRESET_NAMES.length,
                colors.length || fallbackColors.length || 2
            );

            PRESET_NAMES.slice(0, playerCount).forEach((name, index) => {
                const color = colors[index] || fallbackColors[index % fallbackColors.length];
                addEntry(name, "player", color.value, false, isFactionColorOption(color) ? color.name : "");
            });
            turnOrderManuallyAdjusted = false;
            applyGameTurnOrderDefaults();
        }

        function showSetupScreenForTesting() {
            if (state.view === "setup") {
                render();
                return;
            }
            resetToSetup();
        }

        function showGameScreenForTesting() {
            if (state.view === "game") {
                render();
                return;
            }
            if (state.view === "summary") resetToSetup();
            ensureTestingSetupPlayers();
            startGame();
        }

        function showSummaryScreenForTesting() {
            if (state.view === "summary") {
                render();
                return;
            }
            if (state.view !== "game") {
                ensureTestingSetupPlayers();
                startGame();
            }
            endGame();
        }

        function simulateFullGameForTesting() {
            if (state.view !== "game") return;
            const people = sortPlayersByPlacement(state.players.filter(player => player.type === "player"));
            if (!people.length) return;

            const others = state.players.filter(player => player.type === "other");
            const rounds = randomInteger(3, 5);
            const setupDuration = randomInteger(120, 420) * 1000;
            const segments = [];

            for (let round = 0; round < rounds; round += 1) {
                people.forEach((player, playerIndex) => {
                    const base = randomInteger(35, 210);
                    const swing = randomInteger(0, 90);
                    segments.push({
                        kind: "turn",
                        player,
                        duration: (base + swing + round * 8 + playerIndex * 3) * 1000
                    });
                });

                if (others.length && Math.random() > 0.35) {
                    const other = others[randomInteger(0, others.length - 1)];
                    segments.push({
                        kind: "turn",
                        player: other,
                        duration: randomInteger(25, 150) * 1000
                    });
                }

                if (round < rounds - 1 && Math.random() > 0.25) {
                    segments.push({
                        kind: "pause",
                        duration: randomInteger(30, 180) * 1000
                    });
                }
            }

            state.players.forEach(player => {
                player.turns = [];
                if (player.type === "player") player.placement = "";
            });

            const placementOrder = shuffled(people);
            placementOrder.forEach((player, index) => {
                player.placement = String(index + 1);
            });

            const simulatedDuration = setupDuration + segments.reduce((total, segment) => total + segment.duration, 0);
            const endedAt = Date.now();
            let cursor = endedAt - simulatedDuration;

            state.gameStartedAt = cursor;
            state.firstTurnStartedAt = cursor + setupDuration;
            state.setupElapsed = setupDuration;
            state.pauses = [];
            state.activeId = null;
            state.activeTurnStartedAt = null;
            state.currentStartedAt = null;
            state.currentElapsed = 0;
            state.isPaused = false;
            state.pauseStartedAt = null;

            cursor += setupDuration;
            segments.forEach(segment => {
                const start = cursor;
                cursor += segment.duration;
                if (segment.kind === "pause") {
                    state.pauses.push({
                        start,
                        end: cursor,
                        duration: segment.duration
                    });
                } else {
                    segment.player.turns.push({
                        startedAt: start,
                        duration: segment.duration,
                        endedAt: cursor
                    });
                }
            });

            state.gameEndedAt = endedAt;
            state.view = "summary";
            render();
        }

        function openSettingsForTesting() {
            isSettingsOpen = true;
            isChangelogOpen = false;
            isWishlistOpen = false;
            render();
        }

        function closeSettings() {
            isSettingsOpen = false;
            isChangelogOpen = false;
            isWishlistOpen = false;
            render();
        }

        function backToSettingsModule() {
            if (!isSettingsOpen || (!isChangelogOpen && !isWishlistOpen)) return false;
            isChangelogOpen = false;
            isWishlistOpen = false;
            render();
            return true;
        }

        function toggleDateFormat() {
            const nextFormat = dateFormat === "mdy" ? "dmy" : dateFormat === "dmy" ? "ymd" : "mdy";
            setDateFormat(nextFormat);
        }

        function handleSettingsHotkeys(event) {
            if (event.altKey || event.ctrlKey || event.metaKey) return false;
            const key = event.key.toLowerCase();
            const isEditable = isEditableTarget(event.target);

            if (isSettingsOpen && key === "escape") {
                event.preventDefault();
                closeSettings();
                return true;
            }

            if (isSettingsOpen && (key === "backspace" || key === "browserback" || key === "back") && !isEditable) {
                if (backToSettingsModule()) {
                    event.preventDefault();
                    return true;
                }
            }

            if (isEditable || (isSettingsOpen && (isChangelogOpen || isWishlistOpen))) return false;

            if (!["a", "n", "e", "d", "t"].includes(key)) return false;
            event.preventDefault();
            if (key === "a") setThemeMode(themeMode === "dark" ? "light" : "dark");
            if (key === "n") setDisplayNameMode(displayNameMode === "player" ? "faction" : "player");
            if (key === "e") setTextType(textType === "text" ? "emoji" : "text");
            if (key === "d") toggleDateFormat();
            if (key === "t") setTimeFormat(timeFormat === "clock" ? "units" : "clock");
            return true;
        }

        function openChangelogShortcut() {
            isSettingsOpen = true;
            isChangelogOpen = true;
            isWishlistOpen = false;
            render();
        }

        function openWishlistShortcut() {
            isSettingsOpen = true;
            isChangelogOpen = false;
            isWishlistOpen = true;
            render();
        }

        function focusGameSearchShortcut() {
            if (state.view !== "setup") return;
            isSettingsOpen = false;
            isChangelogOpen = false;
            isWishlistOpen = false;
            isGameListCollapsed = false;
            render();
            requestAnimationFrame(() => {
                const search = app.querySelector("input[data-field='game-search']");
                search?.focus();
                search?.select();
            });
        }

        function handleTestingHotkeys(event) {
            if (handleShortcutHintHotkeys(event)) return;
            if (handleSettingsHotkeys(event)) return;
            if (event.altKey || event.ctrlKey || event.metaKey || isEditableTarget(event.target)) return;
            const key = event.key.toLowerCase();
            const isSecretFullGame = state.view === "game" && event.shiftKey && key === "g";
            if (!isSecretFullGame && !["1", "2", "3", "s", "w", "c", "/"].includes(key)) return;
            event.preventDefault();
            if (isSecretFullGame) simulateFullGameForTesting();
            if (key === "1") showSetupScreenForTesting();
            if (key === "2") showGameScreenForTesting();
            if (key === "3") showSummaryScreenForTesting();
            if (key === "s") openSettingsForTesting();
            if (key === "w") openWishlistShortcut();
            if (key === "c") openChangelogShortcut();
            if (key === "/") focusGameSearchShortcut();
        }

        function msToParts(ms) {
            const totalTenths = Math.max(0, Math.floor(ms / 100));
            const tenths = totalTenths % 10;
            const totalSeconds = Math.floor(totalTenths / 10);
            const seconds = totalSeconds % 60;
            const totalMinutes = Math.floor(totalSeconds / 60);
            const minutes = totalMinutes % 60;
            const hours = Math.floor(totalMinutes / 60);
            return { hours, minutes, seconds, tenths };
        }

        function fmtClock(ms) {
            const totalSeconds = Math.max(0, Math.floor(ms / 1000));
            const seconds = totalSeconds % 60;
            const totalMinutes = Math.floor(totalSeconds / 60);
            const minutes = totalMinutes % 60;
            const hours = Math.floor(totalMinutes / 60);
            if (hours) return `${hours}:${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
            return `${minutes}:${String(seconds).padStart(2, "0")}`;
        }

        function fmtUnits(ms) {
            const totalSeconds = Math.max(0, Math.floor(ms / 1000));
            const seconds = totalSeconds % 60;
            const totalMinutes = Math.floor(totalSeconds / 60);
            const minutes = totalMinutes % 60;
            const hours = Math.floor(totalMinutes / 60);
            const parts = [];
            if (hours) parts.push(`${hours}h`);
            if (minutes || hours) parts.push(`${minutes}m`);
            parts.push(`${seconds}s`);
            return parts.join(" ");
        }

        function fmt(ms) {
            return timeFormat === "units" ? fmtUnits(ms) : fmtClock(ms);
        }

        function fmtWhole(ms) {
            return fmt(ms);
        }

        function fmtAxisTime(ms) {
            const totalMinutes = Math.max(0, Math.round(ms / (60 * 1000)));
            const minutes = totalMinutes % 60;
            const hours = Math.floor(totalMinutes / 60);
            if (!hours) return `${minutes}m`;
            if (!minutes) return `${hours}h`;
            return `${hours}h ${minutes}m`;
        }

        function formatDateStamp(timestamp) {
            const date = new Date(timestamp || Date.now());
            const day = String(date.getDate()).padStart(2, "0");
            const month = date.getMonth();
            const monthName = date.toLocaleString(undefined, { month: "long" });
            const monthShort = date.toLocaleString(undefined, { month: "short" });
            const numericMonth = String(month + 1).padStart(2, "0");
            const year = date.getFullYear();
            if (dateFormat === "dmy") return `${day} ${monthShort} ${year}`;
            if (dateFormat === "ymd") return `${year}-${numericMonth}-${day}`;
            return `${monthName} ${date.getDate()}, ${year}`;
        }

        function statsFor(player) {
            const durations = player.turns.map(turn => turn.duration);
            const total = durations.reduce((sum, duration) => sum + duration, 0);
            const count = durations.length;
            return {
                count,
                total,
                average: count ? total / count : 0,
                longest: count ? Math.max(...durations) : 0,
                shortest: count ? Math.min(...durations) : 0
            };
        }

        function placementLabel(value) {
            const rank = Number(value);
            if (!Number.isInteger(rank) || rank <= 0) return "";
            const mod100 = rank % 100;
            const suffix = mod100 >= 11 && mod100 <= 13
                ? "th"
                : rank % 10 === 1
                    ? "st"
                    : rank % 10 === 2
                        ? "nd"
                        : rank % 10 === 3
                            ? "rd"
                            : "th";
            return `${rank}${suffix}`;
        }

        function placementNumber(player) {
            const rank = Number(player?.placement);
            return Number.isInteger(rank) && rank > 0 ? rank : null;
        }

        function placementMedal(player) {
            return { 1: "🥇", 2: "🥈", 3: "🥉" }[placementNumber(player)] || "";
        }

        function placementOptionsMarkup(playerCount, selectedValue = "") {
            const selected = String(selectedValue || "");
            const options = ['<option value="">--</option>'];
            for (let rank = 1; rank <= playerCount; rank += 1) {
                const value = String(rank);
                options.push(`<option value="${value}" ${value === selected ? "selected" : ""}>${esc(placementLabel(rank))}</option>`);
            }
            return options.join("");
        }

        function summaryPlacementMarkup(player, playerCount) {
            if (player.type !== "player") return `<span class="summary-placement-spacer" aria-hidden="true"></span>`;
            return `
        <select class="summary-placement-select" data-action="placement" data-id="${esc(player.id)}" aria-label="Placement for ${esc(displayNameText(player))}">
          ${placementOptionsMarkup(playerCount, player.placement)}
        </select>
      `;
        }

        function placementMedalBadgeMarkup(player) {
            const medal = placementMedal(player);
            if (!medal) return "";
            const label = placementLabel(player?.placement);
            return `<span class="award placement-medal" title="${esc(label)} place" aria-label="${esc(label)} place">${medal}</span>`;
        }

        function summaryAwardsMarkup(player, awards, hasPlacements) {
            const medal = placementMedalBadgeMarkup(player);
            const timeAwards = awardBadges(player, awards);
            const medalSlot = medal || (hasPlacements && timeAwards
                ? `<span class="award placement-medal is-placeholder" aria-hidden="true"></span>`
                : "");
            return `<span class="summary-awards">${medalSlot}${timeAwards}</span>`;
        }

        function groupedPlacedPlayers(players) {
            const groups = new Map();
            players.forEach((player, index) => {
                const rank = placementNumber(player);
                if (!rank) return;
                if (!groups.has(rank)) groups.set(rank, { rank, players: [] });
                groups.get(rank).players.push({ player, index });
            });
            return [...groups.values()].sort((a, b) => a.rank - b.rank);
        }

        function normalizePlacementGroups(players, forceFromFirst = false) {
            const groups = groupedPlacedPlayers(players);
            let nextRank = forceFromFirst ? 1 : null;

            groups.forEach(group => {
                const rank = nextRank === null
                    ? group.rank
                    : forceFromFirst
                        ? nextRank
                        : Math.max(group.rank, nextRank);
                group.players.forEach(({ player }) => {
                    player.placement = String(rank);
                });
                nextRank = rank + group.players.length;
            });
        }

        function autoCorrectPlacements(players) {
            const placedCount = players.filter(player => placementNumber(player)).length;
            if (!placedCount) return;
            normalizePlacementGroups(players, placedCount === players.length);
        }

        function sortPlayersByPlacement(players) {
            const hasPlacements = players.some(player => placementNumber(player));
            if (!hasPlacements) return players;
            return players
                .map((player, index) => ({ player, index, rank: placementNumber(player) }))
                .sort((a, b) => (a.rank ?? Number.POSITIVE_INFINITY) - (b.rank ?? Number.POSITIVE_INFINITY) || a.index - b.index)
                .map(item => item.player);
        }

        function clampTimelineSegment(segment, timelineStart, timelineEnd) {
            const start = Math.max(timelineStart, Math.min(timelineEnd, segment.start));
            const end = Math.max(start, Math.min(timelineEnd, segment.end));
            return {
                ...segment,
                start,
                end,
                wallDuration: Math.max(0, end - start)
            };
        }

        function timelineSegments(ended = state.gameEndedAt || Date.now()) {
            const timelineStart = state.gameStartedAt || ended;
            const timelineEnd = Math.max(timelineStart, ended);
            const segments = [];
            const setupEnd = Math.min(timelineEnd, state.firstTurnStartedAt || timelineStart + setupTotal(ended));

            if (setupEnd > timelineStart) {
                segments.push({
                    laneKey: "setup",
                    type: "setup",
                    label: "Setup",
                    color: NAMED_COLORS.Gray,
                    start: timelineStart,
                    end: setupEnd,
                    duration: setupEnd - timelineStart
                });
            }

            state.players.forEach(player => {
                player.turns.forEach((turn, index) => {
                    const end = turn.endedAt || timelineStart;
                    const duration = Math.max(0, turn.duration || 0);
                    const start = turn.startedAt || Math.max(timelineStart, end - duration);
                    segments.push({
                        laneKey: `player:${player.id}`,
                        type: "turn",
                        label: displayNameText(player),
                        color: player.color,
                        start,
                        end,
                        duration,
