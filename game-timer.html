                        detail: `Turn ${index + 1}`
                    });
                });
            });

            state.pauses.forEach((pause, index) => {
                const end = pause.end || timelineEnd;
                const duration = Math.max(0, pause.duration || 0);
                segments.push({
                    laneKey: "pause",
                    type: "pause",
                    label: "Pause",
                    color: NAMED_COLORS.Black,
                    start: pause.start || Math.max(timelineStart, end - duration),
                    end,
                    duration,
                    detail: `Pause ${index + 1}`
                });
            });

            return segments
                .map(segment => clampTimelineSegment(segment, timelineStart, timelineEnd))
                .filter(segment => segment.wallDuration > 0)
                .sort((a, b) => a.start - b.start || (a.type === "pause" ? 1 : 0) - (b.type === "pause" ? 1 : 0));
        }

        function timelineLanes(segments) {
            const segmentKeys = new Set(segments.map(segment => segment.laneKey));
            const lanes = [];

            if (segmentKeys.has("setup")) {
                lanes.push({
                    key: "setup",
                    type: "setup",
                    label: "Setup",
                    color: NAMED_COLORS.Gray
                });
            }

            state.players.forEach(player => {
                lanes.push({
                    key: `player:${player.id}`,
                    type: player.type === "other" ? "other" : "player",
                    label: displayNameText(player),
                    color: player.color
                });
            });

            if (segmentKeys.has("pause")) {
                lanes.push({
                    key: "pause",
                    type: "pause",
                    label: "Pause",
                    color: NAMED_COLORS.Black
                });
            }

            return lanes.filter(lane => lane.type === "player" || lane.type === "other" || segmentKeys.has(lane.key));
        }

        function timelineTicks(total) {
            const interval = 15 * 60 * 1000;
            const endLabelGuard = interval / 2;
            const safeTotal = Math.max(1, total);
            const ticks = [{ value: 0, label: fmtAxisTime(0), type: "start" }];
            for (let value = interval; value < safeTotal; value += interval) {
                if (safeTotal - value <= endLabelGuard) continue;
                ticks.push({ value, label: fmtAxisTime(value), type: "" });
            }
            const lastTick = ticks[ticks.length - 1];
            if (!lastTick || lastTick.value !== safeTotal) {
                ticks.push({ value: safeTotal, label: fmtAxisTime(safeTotal), type: "end" });
            } else {
                lastTick.type = "end";
            }
            return ticks;
        }

        function timelineMarkup(ended = state.gameEndedAt || Date.now()) {
            const timelineStart = state.gameStartedAt || ended;
            const total = Math.max(1, ended - timelineStart);
            const segments = timelineSegments(ended);
            if (!segments.length) return "";
            const lanes = timelineLanes(segments);
            const ticks = timelineTicks(total);

            return `
          <section class="panel glass timeline-panel" aria-label="Game timeline">
            <div class="timeline-lanes">
              ${lanes.map(lane => {
                const laneSegments = segments.filter(segment => segment.laneKey === lane.key);
                return `
                <div class="timeline-lane is-${esc(lane.type)}" style="--accent:${esc(lane.color)}">
                  <div class="timeline-lane-label">
                    <span class="timeline-dot" style="--accent:${esc(lane.color)}"></span>
                    <span>${esc(lane.label)}</span>
                  </div>
                  <div class="timeline-lane-track">
                    ${laneSegments.map(segment => {
                    const left = ((segment.start - timelineStart) / total) * 100;
                    const width = (segment.wallDuration / total) * 100;
                    const label = `${segment.label} · ${fmt(segment.duration || segment.wallDuration)}`;
                    const detail = segment.detail ? `${segment.detail}: ${label}` : label;
                    return `
                    <span
                      class="timeline-segment is-${esc(segment.type)}"
                      style="--start:${left.toFixed(3)}%; --width:${width.toFixed(3)}%; --accent:${esc(segment.color)}"
                      title="${esc(detail)}"
                      aria-label="${esc(detail)}"
                    ></span>
                  `;
                }).join("")}
                  </div>
                </div>
              `;
            }).join("")}
            </div>
            <div class="timeline-scale" aria-hidden="true">
              <span></span>
              <span class="timeline-scale-track">
                ${ticks.map(tick => `
                  <span class="timeline-tick ${tick.type ? `is-${esc(tick.type)}` : ""}" style="--x:${((tick.value / total) * 100).toFixed(3)}%">${esc(tick.label)}</span>
                `).join("")}
              </span>
            </div>
          </section>
        `;
        }

        function setPlayerPlacement(id, placement) {
            const player = state.players.find(player => player.id === id && player.type === "player");
            if (!player) return;
            player.placement = placement || "";
            autoCorrectPlacements(state.players.filter(player => player.type === "player"));
            render();
        }

        function computeAwards() {
            const people = state.players
                .filter(player => player.type === "player")
                .map(player => ({ player, stats: statsFor(player) }))
                .filter(item => item.stats.count > 0);

            const awards = {
                fastestAverage: null,
                slowestAverage: null,
                fastestTurn: null,
                slowestTurn: null
            };

            if (people.length) {
                awards.fastestAverage = people.reduce((best, item) => item.stats.average < best.stats.average ? item : best).player.id;
                awards.slowestAverage = people.reduce((worst, item) => item.stats.average > worst.stats.average ? item : worst).player.id;
            }

            const allTurns = state.players
                .filter(player => player.type === "player")
                .flatMap(player => player.turns.map(turn => ({ playerId: player.id, duration: turn.duration })));

            if (allTurns.length) {
                awards.fastestTurn = allTurns.reduce((best, item) => item.duration < best.duration ? item : best).playerId;
                awards.slowestTurn = allTurns.reduce((worst, item) => item.duration > worst.duration ? item : worst).playerId;
            }

            return awards;
        }

        function awardBadges(player, awards) {
            const badges = [];
            if (player.type === "player" && awards.fastestAverage === player.id) badges.push(["🐇", "Fastest average"]);
            if (player.type === "player" && awards.slowestAverage === player.id) badges.push(["🐢", "Slowest average"]); // 🐢 🦥 🐌 🐛 🐫 ⌛ 🚜 🪨 🕰️
            if (player.type === "player" && awards.fastestTurn === player.id) badges.push(["🚀", "Fastest turn"]); // 🐆 🦅 🐇 🐎 🦈 ⚡ 🚀 🏎️ ✈️ 
            if (player.type === "player" && awards.slowestTurn === player.id) badges.push(["⌛", "Slowest turn"]);
            return badges.map(([symbol, label]) => `<span class="award" title="${esc(label)}" aria-label="${esc(label)}">${symbol}</span>`).join("");
        }

        function awardLabels(player, awards) {
            const labels = [];
            if (player.type === "player" && awards.fastestAverage === player.id) labels.push("Fastest average");
            if (player.type === "player" && awards.slowestAverage === player.id) labels.push("Slowest average");
            if (player.type === "player" && awards.fastestTurn === player.id) labels.push("Fastest turn");
            if (player.type === "player" && awards.slowestTurn === player.id) labels.push("Slowest turn");
            return labels;
        }

        function turnBadges(player, turn, stats) {
            if (!stats.count || stats.count < 2) return "";
            const badges = [];
            if (turn.duration === stats.shortest) badges.push(["⚡", "Player fastest turn"]);
            if (turn.duration === stats.longest) badges.push(["⌛", "Player slowest turn"]);
            if (!badges.length) return "";
            return `
        <span class="turn-badges">
          ${badges.map(([symbol, label]) => `<span class="turn-award" title="${esc(label)}" aria-label="${esc(label)}">${symbol}</span>`).join("")}
        </span>
      `;
        }

        function canStartSetup() {
            return setupEntries.some(entry => entry.type === "player" && entry.name.trim());
        }

        function filteredGames() {
            const [custom, ...games] = GAME_PRESETS;
            return [custom, ...games.slice().sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true }))];
        }

        function gameTitleParts(name) {
            const text = String(name || "").trim();
            const match = text.match(/\s*\((\d{4})\)\s*$/);
            if (!match) return { title: text, year: "" };
            return {
                title: text.slice(0, match.index).trim(),
                year: match[1]
            };
        }

        function gameAccessibleName(name) {
            const { title, year } = gameTitleParts(name);
            return year ? `${title} ${year}` : title;
        }

        function gameSearchText(game) {
            const { title, year } = gameTitleParts(game.name);
            const factionText = hasFactionColorOptions(colorsForGame(game)) ? "faction faction-based factions" : "";
            const otherTimingText = hasDefaultOtherTiming(game) ? `other timing other-timing ${defaultOtherTimingNames(game).join(" ")}` : "";
            return [game.name, title, year, game.id, factionText, otherTimingText, turnOrderSearchText(game)].filter(Boolean).join(" ").toLowerCase();
        }

        function gameTitleMarkup(name, className = "") {
            const { title, year } = gameTitleParts(name);
            const classes = ["game-title-line", className].filter(Boolean).join(" ");
            return `
        <span class="${esc(classes)}">
          <span class="game-title-name">${esc(title)}</span>
          ${year ? `<span class="game-year-tag">${esc(year)}</span>` : ""}
        </span>
      `;
        }

        function turnOrderBadgeMarkup(game) {
            const rule = turnOrderRuleForGame(game);
            if (!rule) return "";
            const label = turnOrderBadgeLabel(rule);
            return `<span class="turn-order-badge" title="${esc(label)}" aria-label="${esc(label)}">T</span>`;
        }

        function factionBadgeMarkup(game) {
            if (!hasFactionColorOptions(colorsForGame(game))) return "";
            return `<span class="faction-badge" title="Faction based" aria-label="Faction based game">F</span>`;
        }

        function otherTimingBadgeMarkup(game) {
            const names = defaultOtherTimingNames(game);
            if (!names.length) return "";
            const label = `Known other timing: ${names.join(", ")}`;
            return `<span class="other-timing-badge" title="${esc(label)}" aria-label="${esc(label)}">O</span>`;
        }

        function verifiedBadgeMarkup(game) {
            if (!game?.verified) return "";
            return `<span class="verified-badge" title="Verified game" aria-label="Verified game">✓</span>`;
        }

        function turnOrderRuleMarkup(rule) {
            if (!rule) return "";
            return `
        <div class="turn-order-rule">
          <span class="turn-order-rule-icon" aria-hidden="true">${esc(rule.icon || "↕")}</span>
          <span class="turn-order-rule-text">
            <strong>${esc(rule.label || "Turn order rule")}</strong>
            <span>${esc(rule.note || "This game has custom turn-order setup.")}</span>
          </span>
        </div>
      `;
        }

        function colorButton(color, selectedValue, action) {
            const isQuick = color.value === PLAYER_QUICK_COLOR;
            return `
        <button class="color-btn ${isQuick ? "is-rainbow" : ""}" data-action="${esc(action)}" ${isQuick ? `data-shortcut="Q"` : ""} data-color="${esc(color.value)}" aria-pressed="${color.value === selectedValue}" style="--swatch:${isQuick ? "#f8fafc" : esc(color.value)}">
          <span class="color-dot" aria-hidden="true"></span>
          <span>${esc(color.name)}</span>
        </button>
      `;
        }

        function nameButton(name) {
            const color = playerColorForName(name);
            const factionName = selectedPlayerColor === PLAYER_QUICK_COLOR ? "" : factionNameForSelection(selectedPlayerColor);
            return `
        <button class="chip-btn name-chip" data-action="name" data-name="${esc(name)}" data-color="${esc(color)}" data-faction-name="${esc(factionName)}" style="--accent:${esc(color)}">
          <span class="mini-dot" aria-hidden="true"></span>
          <span>${esc(name)}</span>
        </button>
      `;
        }

        function gameRangeText(game) {
            const playerRange = `${game.minPlayers}-${game.maxPlayers}`;
            const playerText = `${playerRange}p`;
            const weightValue = Number.isFinite(game.complexityWeight)
                ? game.complexityWeight.toFixed(1)
                : "??";
            const timeValue = game.minMinutes === game.maxMinutes
                ? `${game.minMinutes} min`
                : `${game.minMinutes}-${game.maxMinutes} min`;
            const recommendedValue = game.recommendedPlayers || playerRange;
            const bestValue = game.bestPlayers || game.recommendedPlayers || playerRange;
            const avoidValue = game.avoidPlayers || "None";
            if (textType === "emoji") {
                return `👥 ${playerText} • 👍 ${recommendedValue} • ⭐ ${bestValue} • ⚠️ ${avoidValue}\n🕰️ ${timeValue} • 🧠 ${weightValue}`;
            }
            return `${playerText} • Rec ${recommendedValue} • Best ${bestValue} • Avoid ${avoidValue}\n${timeValue} • Weight ${weightValue}`;
        }

        function swatchesMarkup(colors, limit = 16, { rainbow = false } = {}) {
            if (rainbow) {
                return `
        <span class="swatches" aria-hidden="true">
          <span class="swatch is-rainbow"></span>
        </span>
      `;
            }
            const previewColors = colors.slice(0, limit);
            return `
        <span class="swatches" aria-hidden="true">
          ${previewColors.map(color => `<span class="swatch" style="--swatch:${esc(color.value)}"></span>`).join("")}
          ${colors.length > previewColors.length ? `<span class="swatch-count">+${colors.length - previewColors.length}</span>` : ""}
        </span>
      `;
        }

        function gameOption(game) {
            const colors = colorsForGame(game);
            const showRainbowPreview = usesOpenColorPool(game) && game.id !== "custom";
            const query = gameSearch.trim().toLowerCase();
            const searchText = gameSearchText(game);
            const isHidden = Boolean(query) && game.id !== "custom" && !searchText.includes(query);
            return `
        <button
          class="game-option ${isHidden ? "hidden" : ""}"
          data-action="preset"
          data-game-id="${esc(game.id)}"
          data-search-text="${esc(searchText)}"
          aria-pressed="${game.id === selectedGameId}"
        >
          <span>
            <strong class="game-option-title">${gameTitleMarkup(game.name)}${factionBadgeMarkup(game)}${turnOrderBadgeMarkup(game)}${otherTimingBadgeMarkup(game)}</strong>
            <small>${esc(gameRangeText(game))}</small>
          </span>
          <span class="game-option-preview">
            ${verifiedBadgeMarkup(game)}
            ${swatchesMarkup(colors, 16, { rainbow: showRainbowPreview })}
          </span>
        </button>
      `;
        }

        function renderSetup() {
            ensureRuleLookup();
            const preset = currentPreset();
            const colors = selectedGameColors();
            const hasFactionChoices = hasKnownColorOptions(colors);
            const playerColors = playerColorOptions(colors);
            if (!playerColors.some(color => color.value === selectedPlayerColor)) {
                selectedPlayerColor = hasFactionChoices ? playerColors[0]?.value || "" : PLAYER_QUICK_COLOR;
            }
            const isQuickColor = selectedPlayerColor === PLAYER_QUICK_COLOR;
            const playerAccent = isQuickColor ? "#f8fafc" : selectedPlayerColor;
            const playerChoiceLabel = hasFactionChoices ? "Factions" : "Colors";

            const playerEntries = setupEntries.filter(entry => entry.type === "player");
            const otherEntries = setupEntries.filter(entry => entry.type === "other");
            const starter = setupEntries.find(entry => entry.id === selectedStarterId);
            const starterNames = starter ? displayNameParts(starter) : null;
            const canStart = canStartSetup();
            const playerCount = playerEntries.filter(entry => entry.name.trim()).length;
            const turnOrderRule = turnOrderRuleForGame(preset);

            app.innerHTML = `
        <main class="shell setup-shell ${isGameListCollapsed ? "game-list-collapsed" : ""}">
          <header class="setup-bar header-bar glass">
            <div class="brand">
              <span class="app-label">
                <span class="app-name">Game Timer</span>
                <span class="version-badge">v${esc(appVersion())}</span>
              </span>
              <button class="settings-fab" data-action="settings-open" data-shortcut="S" aria-label="Open settings" title="Settings">⚙</button>
            </div>
            <div class="nav-status setup-game-toggle" data-action="toggle-game-list" role="button" tabindex="0" aria-expanded="${isGameListCollapsed ? "false" : "true"}">
              ${gameTitleMarkup(preset.name, "label")}
              <span class="range-note">${esc(gameRangeText(preset))}</span>
            </div>
            <div class="top-actions">
              <button class="action-btn randomize-btn" data-action="randomize" data-shortcut="R">
                <span aria-hidden="true">↯</span>
                <span>Random</span>
              </button>
              <button class="action-btn reset-btn" data-action="setup-reset" data-shortcut="X">
                <span aria-hidden="true">↺</span>
                <span>Reset</span>
              </button>
              <button class="action-btn start-btn" data-action="start" data-shortcut="G" ${canStart ? "" : "disabled"}>
                <span aria-hidden="true">▶</span>
                <span>Start</span>
              </button>
            </div>
          </header>

          <div class="setup-grid">
            <section class="panel glass game-panel">
              <div class="section-head">
                <h2>Games</h2>
                <input data-field="game-search" value="${esc(gameSearch)}" placeholder="Search" autocomplete="off">
                <button class="game-collapse-btn" data-action="toggle-game-list" data-shortcut="H" aria-label="Collapse game list" title="Collapse game list">
                  <span aria-hidden="true">X</span>
                </button>
              </div>
              <div class="game-list" aria-label="Games">
                ${filteredGames().map(gameOption).join("")}
              </div>
            </section>

            <div class="setup-stack">
              <section class="panel glass player-add-panel">
                <div class="section-head">
                  <h2>Add Players</h2>
                  <div class="selection-actions">
                    <span class="selection-pill ${isQuickColor ? "is-rainbow" : ""}" style="--accent:${esc(playerAccent)}">
                      <span class="dot" style="--accent:${esc(playerAccent)}"></span>
                      ${esc(colorName(selectedPlayerColor, playerColors))}
                    </span>
                    <button class="action-btn randomize-btn" data-action="randomize-selected-game" data-shortcut="V">
                      <span aria-hidden="true">↯</span>
                      <span>Random</span>
                    </button>
                  </div>
                </div>

                <div class="player-add-body">
                  <div class="player-add-column">
                    <div class="label-row">
                      <span class="label">${playerChoiceLabel}: ${playerColors.length}</span>
                    </div>
                    <div class="color-grid">
                      ${playerColors.map(color => colorButton(color, selectedPlayerColor, "select-player-color")).join("")}
                    </div>
                  </div>

                  <div class="player-add-column">
                    <div class="label-row">
                      <span class="label">People</span>
                    </div>
                    <div class="chip-grid name-bank-grid">
                      ${PRESET_NAMES.map(nameButton).join("")}
                    </div>

                    <div class="custom-add">
                      <input data-field="custom-player" placeholder="Custom player name" autocomplete="off" autocapitalize="words">
                      <button class="action-btn" data-action="custom-player" data-shortcut="P">
                        <span aria-hidden="true">＋</span>
                        <span>Custom Name</span>
                      </button>
                    </div>
                  </div>
                </div>
              </section>

              <section class="panel glass other-panel">
                <div class="section-head">
                  <h2>Other</h2>
                  <span class="selection-pill" style="--accent:${esc(selectedOtherColor)}">
                    <span class="dot" style="--accent:${esc(selectedOtherColor)}"></span>
                    ${esc(colorName(selectedOtherColor, OTHER_COLORS))}
                  </span>
                </div>

                <div class="color-grid other-color-grid">
                  ${OTHER_COLORS.map(color => colorButton(color, selectedOtherColor, "select-other-color")).join("")}
                </div>

                <div class="chip-grid other-name-grid">
                  ${OTHER_NAMES.filter(name => name !== RULE_LOOKUP_NAME).map(name => `<button class="chip-btn" data-action="other" data-name="${esc(name)}">${esc(name)}</button>`).join("")}
                </div>

                <div class="custom-add">
                  <input data-field="custom-other" placeholder="Custom other name" autocomplete="off" autocapitalize="words">
                  <button class="action-btn" data-action="custom-other" data-shortcut="O">
                    <span aria-hidden="true">＋</span>
                    <span>Custom Name</span>
                  </button>
                </div>

                <div class="roster-list other-list">
                  ${otherEntries.map((entry, index) => rosterRow(entry, index)).join("")}
                </div>
              </section>
            </div>

            <section class="panel glass turn-order-panel">
              <div class="section-head">
                <div class="turn-order-title">
                  <h2>Turn Order</h2>
                  <p class="range-note">${playerCount} players</p>
                </div>
                <div class="section-actions turn-order-actions">
                  <button class="action-btn clear-btn" data-action="clear-turn-order" data-shortcut="L" ${playerEntries.length ? "" : "disabled"}>
                    <span aria-hidden="true">×</span>
                    <span>Clear</span>
                  </button>
                  <button class="action-btn first-btn" data-action="first" data-shortcut="F" ${playerEntries.length ? "" : "disabled"}>
                    <span aria-hidden="true">🎲</span>
                    <span>First</span>
                  </button>
                </div>
              </div>

              ${turnOrderRuleMarkup(turnOrderRule)}

              ${starter ? `
                <div class="starter-banner" style="--starter:${esc(starter.color)}">
                  <span class="subtle">First</span>
                  <span class="starter-name">
                    <span class="dot" style="--accent:${esc(starter.color)}"></span>
                    <span class="starter-display">
                      <strong>${esc(starterNames.primary)}</strong>
                      ${starterNames.secondary ? `<span>${esc(starterNames.secondary)}</span>` : ""}
                    </span>
                  </span>
                </div>
              ` : ""}

              <div class="roster-list player-list" id="rosterList">
                ${playerEntries.length ? playerEntries.map((entry, index) => rosterRow(entry, index)).join("") : `
                  <div class="empty-panel">
                    Pick a color, then tap a name to add players.
                  </div>
                `}
              </div>
            </section>
          </div>
        </main>
      `;
            bindSetupEvents();
            stopTick();
        }

        function rosterRow(entry, index) {
            const hasFaction = Boolean(entry.factionName);
            const factionFirst = hasFaction && displayNameMode === "faction";
            const primaryClass = `${hasFaction ? "has-faction" : "no-faction"} ${factionFirst ? "is-faction-primary" : "is-player-primary"}`;
            const inputMarkup = `<input data-field="name" data-id="${esc(entry.id)}" value="${esc(entry.name)}" placeholder="${entry.type === "other" ? "Other name" : "Player name"}" autocomplete="off" autocapitalize="words" ${entry.locked ? "disabled" : ""}>`;
            return `
        <div class="roster-row ${primaryClass} ${dragState && dragState.id === entry.id ? "is-dragging" : ""}" data-id="${esc(entry.id)}" data-entry-type="${esc(entry.type)}" style="--accent:${esc(entry.color)}">
          <button class="icon-btn drag-handle" data-action="drag" data-id="${esc(entry.id)}" aria-label="Drag ${esc(entry.name || "player")}">↕</button>
          <div class="roster-name-cell">
            ${factionFirst ? `<span class="roster-faction is-primary">${esc(entry.factionName)}</span>` : ""}
            ${inputMarkup}
            ${hasFaction && !factionFirst ? `<span class="roster-faction">${esc(entry.factionName)}</span>` : ""}
          </div>
          <label class="roster-color" aria-label="Color for ${esc(entry.name || "entry")}" title="Color">
            <span class="roster-color-swatch" aria-hidden="true"></span>
            <input data-field="color" data-id="${esc(entry.id)}" type="color" value="${esc(entry.color)}">
          </label>
          <button class="remove-btn" ${entry.locked ? "disabled" : `data-action="remove" data-id="${esc(entry.id)}"`} aria-label="Remove ${esc(entry.name || "entry")}">×</button>
        </div>
      `;
        }

        function bindSetupEvents() {
            app.querySelectorAll("[data-action]").forEach(element => {
                if (element.dataset.action === "drag") return;
                element.addEventListener("click", event => {
                    const action = event.currentTarget.dataset.action;
                    if (action === "preset") applyGamePreset(event.currentTarget.dataset.gameId);
                    if (action === "select-player-color") {
                        selectedPlayerColor = event.currentTarget.dataset.color;
                        render();
                    }
                    if (action === "select-other-color") {
                        selectedOtherColor = event.currentTarget.dataset.color;
                        render();
                    }
                    if (action === "name") {
                        addName(
                            event.currentTarget.dataset.name,
                            event.currentTarget.dataset.color || selectedPlayerColor,
                            event.currentTarget.dataset.factionName || ""
                        );
                    }
                    if (action === "other") addOther(event.currentTarget.dataset.name);
                    if (action === "custom-player") {
                        const input = document.querySelector("input[data-field='custom-player']");
                        const name = input?.value.trim();
                        if (name) addName(name);
                    }
                    if (action === "custom-other") {
                        const input = document.querySelector("input[data-field='custom-other']");
                        const name = input?.value.trim();
                        if (name) addOther(name);
                    }
                    if (action === "add-all") addAllNames();
                    if (action === "first") pickFirstPlayer();
                    if (action === "clear-turn-order") clearTurnOrder();
                    if (action === "toggle-game-list") {
                        isGameListCollapsed = !isGameListCollapsed;
                        render();
                    }
                    if (action === "randomize") randomizeSetup();
                    if (action === "randomize-selected-game") randomizeSelectedGame();
                    if (action === "setup-reset") resetStartPage();
                    if (action === "remove") removeEntry(event.currentTarget.dataset.id);
                    if (action === "start") startGame();
                });
            });

            app.querySelectorAll("[data-action='toggle-game-list']").forEach(element => {
                element.addEventListener("keydown", event => {
                    if (event.key === "Enter" || event.key === " ") {
                        event.preventDefault();
                        isGameListCollapsed = !isGameListCollapsed;
                        render();
                    }
                });
            });

            app.querySelector("input[data-field='game-search']")?.addEventListener("input", event => {
                gameSearch = event.currentTarget.value;
                const query = gameSearch.trim().toLowerCase();
                document.querySelectorAll(".game-option[data-search-text]").forEach(option => {
                    const isCustom = option.dataset.gameId === "custom";
                    const matches = option.dataset.searchText.includes(query);
                    option.classList.toggle("hidden", Boolean(query) && !isCustom && !matches);
                });
            });

            app.querySelectorAll("input[data-field='name']").forEach(input => {
                input.addEventListener("input", event => {
                    updateEntry(event.currentTarget.dataset.id, { name: event.currentTarget.value });
                    updateStartButton();
                });
            });

            app.querySelectorAll("input[data-field='color']").forEach(input => {
                input.addEventListener("input", event => {
                    updateEntry(event.currentTarget.dataset.id, { color: event.currentTarget.value });
                    const row = event.currentTarget.closest(".roster-row");
                    if (row) row.style.setProperty("--accent", event.currentTarget.value);
                });
            });

            app.querySelectorAll(".drag-handle[data-id]").forEach(handle => {
                handle.addEventListener("pointerdown", startDrag);
            });
        }

        function updateStartButton() {
            const button = document.querySelector("[data-action='start']");
            if (!button) return;
            button.disabled = !setupEntries.some(entry => entry.type === "player" && entry.name.trim());
        }

        function startDrag(event) {
            event.preventDefault();
            const entry = setupEntries.find(item => item.id === event.currentTarget.dataset.id);
            dragState = { id: event.currentTarget.dataset.id, type: entry?.type || "player" };
            event.currentTarget.setPointerCapture?.(event.pointerId);
            window.addEventListener("pointermove", moveDrag, { passive: false });
            window.addEventListener("pointerup", endDrag, { once: true });
            render();
        }

        function moveDrag(event) {
            if (!dragState) return;
            event.preventDefault();
            const rows = Array.from(document.querySelectorAll(`.roster-row[data-entry-type="${dragState.type}"][data-id]`))
                .filter(row => row.dataset.id !== dragState.id);
            let targetIndex = 0;
            rows.forEach(row => {
                const rect = row.getBoundingClientRect();
                if (event.clientY > rect.top + rect.height / 2) targetIndex += 1;
            });
            const group = setupEntries.filter(entry => entry.type === dragState.type);
            const oldIndex = group.findIndex(entry => entry.id === dragState.id);
            if (oldIndex < 0 || targetIndex === oldIndex) return;
            const [entry] = group.splice(oldIndex, 1);
            group.splice(targetIndex, 0, entry);
            let groupIndex = 0;
            setupEntries = setupEntries.map(entry => entry.type === dragState.type ? group[groupIndex++] : entry);
            if (dragState.type === "player") turnOrderManuallyAdjusted = true;
            selectedStarterId = null;
            render();
        }

        function endDrag() {
            window.removeEventListener("pointermove", moveDrag);
            dragState = null;
            render();
        }

        function sessionGridLayout(count) {
            const safeCount = Math.max(1, count);
            const rows = safeCount <= 4 ? 1 : safeCount <= 8 ? 2 : 3;
            const columns = Math.ceil(safeCount / rows);
            const smallColumns = safeCount <= 1 ? 1 : safeCount <= 4 ? 2 : 3;
            const smallRows = Math.ceil(safeCount / smallColumns);
            return { columns, rows, smallColumns, smallRows };
        }

        function sessionDensityForCardHeight(cardHeight) {
            if (cardHeight < 120) return "essential";
            if (cardHeight < 240) return "insightful";
            return "detailed";
        }

        function applySessionDensityClass() {
            if (state.view !== "game") return;
            const grid = app.querySelector(".players-grid");
            const firstCard = grid?.querySelector(".player-card");
            if (!grid || !firstCard) return;
            const cardHeight = firstCard.getBoundingClientRect().height;
            const density = sessionDensityForCardHeight(cardHeight);
            grid.classList.toggle("is-insightful", density === "insightful");
            grid.classList.toggle("is-essential", density === "essential");
            grid.dataset.density = density;
        }

        function scheduleSessionDensityCheck() {
            if (sessionDensityFrame) window.cancelAnimationFrame(sessionDensityFrame);
            sessionDensityFrame = window.requestAnimationFrame(() => {
                sessionDensityFrame = null;
                applySessionDensityClass();
            });
        }

        function renderGame() {
            const now = Date.now();
            const active = getPlayer(state.activeId);
            const activeNames = active ? displayNameParts(active) : null;
            const awards = computeAwards();
            const playerCount = state.players.length;
            const layout = sessionGridLayout(playerCount);
            const gridClasses = "players-grid";
            app.innerHTML = `
        <main class="shell game-shell">
          <header class="session-bar header-bar glass">
            <div class="brand">
              <span class="app-label">
                <span class="app-name">Game Timer</span>
                <span class="version-badge">v${esc(appVersion())}</span>
              </span>
              <button class="settings-fab" data-action="settings-open" data-shortcut="S" aria-label="Open settings" title="Settings">⚙</button>
            </div>

            <div class="current-chip" id="currentChip" style="--accent:${esc(active ? active.color : "#ffffff")}">
              ${gameTitleMarkup(state.gameName, "label")}
              <span class="current-name-line">
                <strong>${activeNames ? esc(activeNames.primary) : "Ready"}</strong>
                ${activeNames?.secondary ? `<span class="current-secondary">${esc(activeNames.secondary)}</span>` : ""}
              </span>
            </div>

            <div class="metric-strip">
              <div class="metric">
                <span class="label">Game</span>
                <strong id="gameTotal">${fmtWhole(now - state.gameStartedAt)}</strong>
              </div>

              <div class="metric">
                <span class="label">Setup</span>
                <strong id="setupTotal">${fmtWhole(setupTotal(now))}</strong>
              </div>

              <div class="metric">
                <span class="label">Pause</span>
                <strong id="pauseTotal">${fmtWhole(pauseTotal(now))}</strong>
              </div>

              <button class="action-btn end-btn" data-action="end" data-shortcut="E">
                <span aria-hidden="true">■</span>
                <span>End</span>
              </button>
            </div>
          </header>

          <section class="${gridClasses}" style="--player-cols:${layout.columns};--player-rows:${layout.rows};--player-cols-small:${layout.smallColumns};--player-rows-small:${layout.smallRows}">
            ${state.players.map(player => playerCard(player, awards, now)).join("")}
          </section>

          <section class="session-bottom-actions glass" aria-label="Session controls">
            <button class="action-btn pause-btn" data-action="pause" data-shortcut="P" aria-pressed="${state.isPaused}">
              <span aria-hidden="true">${state.isPaused ? "▶" : "⏸"}</span>
              <span>${state.isPaused ? "Resume" : "Pause"}</span>
            </button>
            <button class="action-btn advance-btn" data-action="advance" data-shortcut="A">
              <span aria-hidden="true">⏭</span>
              <span>Auto</span>
            </button>
          </section>
        </main>
      `;
            applySessionDensityClass();
            bindGameEvents();
            startTick();
        }

        function playerCard(player, awards, now) {
            const stats = statsFor(player);
            const isActive = state.activeId === player.id;
            const elapsed = isActive ? activeElapsed(now) : 0;
            const liveText = isActive ? fmt(elapsed) : fmt(stats.total);
            const typeLabel = player.type === "other" ? "Other" : "Player";
            const names = displayNameParts(player);
            const secondaryName = names.secondary || typeLabel;
            const turns = player.turns
                .map((turn, index) => ({ turn, turnNumber: index + 1 }))
                .slice()
                .reverse()
                .map(({ turn, turnNumber }) => `
        <li>
          <span class="turn-label">Turn ${turnNumber}${turnBadges(player, turn, stats)}</span>
          <strong>${fmt(turn.duration)}</strong>
        </li>
      `).join("");

            return `
        <article
          class="player-card ${isActive ? "is-active" : ""} ${isActive && state.isPaused ? "is-paused" : ""} ${player.type === "other" ? "is-other" : ""}"
          role="button"
          tabindex="0"
          data-action="player"
          data-id="${esc(player.id)}"
          style="--accent:${esc(player.color)}"
          aria-label="${esc(displayNameText(player))}"
        >

                `long ${stats.count ? fmt(stats.longest) : "--"}`,

            const placement = placementLabel(player.placement);
            if (placement) parts.unshift(placement);
            const labels = awardLabels(player, awards);
            if (labels.length) parts.push(labels.join(", "));
            return `- ${displayNameText(player)}: ${parts.join(" | ")}`;

        function summarySharePayload() {

            const paused = pauseTotal(ended);
            const setup = setupTotal(ended);
            const play = Math.max(0, total - paused - setup);
            const turns = state.players.reduce((sum, player) => sum + player.turns.length, 0);
            const awards = computeAwards();
            const people = sortPlayersByPlacement(state.players.filter(player => player.type === "player"));

        function legacyCopyText(text) {

            textarea.value = text;
            textarea.setAttribute("readonly", "");
            textarea.style.position = "fixed";
            textarea.style.inset = "0 auto auto 0";
            textarea.style.width = "1px";
            textarea.style.height = "1px";
            textarea.style.opacity = "0";
            document.body.appendChild(textarea);
            textarea.select();
            const copied = document.execCommand?.("copy");
            textarea.remove();
            if (!copied) throw new Error("Clipboard unavailable");
        }

        async function copySummaryText(text) {
            if (navigator.clipboard?.writeText) {
                try {
                    await navigator.clipboard.writeText(text);
                    return;
                } catch {
                    // Fall through to the selection-based copy path for older or restricted browsers.
                }
            }
            legacyCopyText(text);
        }

        function documentCssText() {

        function imageFromSource(source) {
            return new Promise((resolve, reject) => {
                const image = new Image();
                image.onload = () => resolve(image);
                image.onerror = reject;
                image.src = source;
            });
        }

        function canvasBlob(canvas, type = "image/png") {
            return new Promise((resolve, reject) => {
                canvas.toBlob(blob => blob ? resolve(blob) : reject(new Error("Image export failed")), type);
            });
        }

        async function summaryScreenshotBlob() {
            const target = app.querySelector(".summary-shell") || app;
            const width = Math.ceil(Math.max(target.scrollWidth, target.getBoundingClientRect().width, 1));
            const height = Math.ceil(Math.max(target.scrollHeight, target.getBoundingClientRect().height, 1));
            const clone = target.cloneNode(true);
            clone.style.width = `${width}px`;
            clone.style.margin = "0";

            const wrapper = document.createElement("div");
            wrapper.setAttribute("xmlns", "http://www.w3.org/1999/xhtml");
            wrapper.style.width = `${width}px`;
            wrapper.style.minHeight = `${height}px`;
            wrapper.style.background = getComputedStyle(document.body).backgroundColor || "#0f172a";

            const style = document.createElement("style");
            style.textContent = `${documentCssText()}\nbody{margin:0}.share-fallback-overlay{display:none!important}`;
            wrapper.append(style, clone);

            const markup = new XMLSerializer().serializeToString(wrapper);
            const svg = `
        <svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="${height}" viewBox="0 0 ${width} ${height}">
          <foreignObject width="100%" height="100%">${markup}</foreignObject>
        </svg>
      `;
            const source = `data:image/svg+xml;charset=utf-8,${encodeURIComponent(svg)}`;
            const image = await imageFromSource(source);
            const scale = Math.min(2, window.devicePixelRatio || 1);
            const canvas = document.createElement("canvas");
            canvas.width = Math.ceil(width * scale);
            canvas.height = Math.ceil(height * scale);
            const context = canvas.getContext("2d");
            context.scale(scale, scale);
            context.fillStyle = getComputedStyle(document.body).backgroundColor || "#0f172a";
            context.fillRect(0, 0, width, height);
            context.drawImage(image, 0, 0, width, height);
            return canvasBlob(canvas);
        }

        async function copyImageBlob(blob) {
            if (!navigator.clipboard?.write || typeof ClipboardItem === "undefined") throw new Error("Image clipboard unavailable");
            await navigator.clipboard.write([new ClipboardItem({ [blob.type]: blob })]);
        }

        async function shareSummaryImage(button) {
            const payload = summarySharePayload();
            try {
                await new Promise(resolve => requestAnimationFrame(() => requestAnimationFrame(resolve)));
                const blob = await summaryScreenshotBlob();
                flashShareButton(button, "Image...");
                const file = new File([blob], payload.imageName, { type: blob.type });
                if (navigator.share && navigator.canShare?.({ files: [file] })) {
                    await navigator.share({ title: payload.title, text: payload.text, files: [file] });
                    flashShareButton(button, "Shared");
                    return;
                }
                try {
                    await copyImageBlob(blob);
                    flashShareButton(button, "Copied");
                } catch {
                    showShareImageFallback(payload, blob);
                    flashShareButton(button, "Ready");
                }
            } catch (error) {
                if (error?.name === "AbortError") return;
                flashShareButton(button, "Failed");
            }
        }

        function wishlistPriorityRank(priority) {
            const rank = WISHLIST_PRIORITY_ORDER.indexOf(priority);
            return rank >= 0 ? rank : WISHLIST_PRIORITY_ORDER.length;

        function wishlistLoeRank(loe) {
            const rank = WISHLIST_LOE_ORDER.indexOf(loe);
            return rank >= 0 ? rank : WISHLIST_LOE_ORDER.length;
        }

        function wishlistIdRank(id) {
            const match = String(id || "").match(/\d+/);
            return match ? Number(match[0]) : Number.MAX_SAFE_INTEGER;
        }

        function compareWishlistItems(a, b) {
            const byId = wishlistIdRank(a.id) - wishlistIdRank(b.id);
            const byPriority = wishlistPriorityRank(a.priority) - wishlistPriorityRank(b.priority);
            const byLoe = wishlistLoeRank(a.loe) - wishlistLoeRank(b.loe);
            const byCategory = a.category.localeCompare(b.category, undefined, { sensitivity: "base" });
            let result = byPriority || byCategory || byLoe || byId;
            if (wishlistSortMode === "category") result = byCategory || byPriority || byLoe || byId;
            if (wishlistSortMode === "loe") result = byLoe || byPriority || byCategory || byId;
            if (wishlistSortMode === "id") result = byId;
            return wishlistSortDirection === "desc" ? -result : result;
        }

        function uniqueWishlistValues(key, order = null) {
            const values = Array.from(new Set(WISHLIST_ITEMS.map(item => item[key]).filter(Boolean)));
            if (order) {
                return values.sort((a, b) => {
                    const aRank = order.indexOf(a);
                    const bRank = order.indexOf(b);
                    const safeA = aRank >= 0 ? aRank : order.length;
                    const safeB = bRank >= 0 ? bRank : order.length;
                    return safeA - safeB || a.localeCompare(b, undefined, { sensitivity: "base" });
                });
            }
            return values.sort((a, b) => a.localeCompare(b, undefined, { sensitivity: "base" }));
        }

            return WISHLIST_ITEMS

                .filter(item => wishlistLoeFilter === "all" || item.loe === wishlistLoeFilter)
                .slice()
                .sort(compareWishlistItems);

            const wishlistItems = visibleWishlistItems.length ? visibleWishlistItems.map(item => `
        <div class="changelog-item">
          <strong>${esc(item.id)} - ${esc(item.title)}</strong>
          <div class="wishlist-meta" aria-label="Wishlist metadata">
            <span>ID: ${esc(item.id)}</span>
            <span>Category: ${esc(item.category)}</span>
            <span>Priority: ${esc(item.priority)}</span>
            <span>Level of Effort: ${esc(item.loe)}</span>
          </div>
          <div class="changelog-markdown">${renderMarkdown(item.notes)}</div>
        </div>
      `).join("") : `
        <div class="changelog-item">
          <strong>No wishlist items match</strong>
          <div class="changelog-markdown"><p>Adjust the category, priority, or Level of Effort filters.</p></div>
        </div>
      `;

            return `
        ${isSettingsOpen ? `
          <div class="settings-overlay" data-action="settings-backdrop">
            ${isChangelogOpen ? `
              <section class="changelog-screen glass" role="dialog" aria-modal="true" aria-labelledby="changelogTitle">
                <div class="settings-head">
                  <div class="brand">
                    <span>Game Timer</span>
                    <h2 id="changelogTitle">Changelog</h2>
                  </div>
                  <div class="settings-module-actions">
                    <button class="action-btn settings-back-btn" data-action="changelog-back" data-shortcut="B" title="Backspace">
                      <span aria-hidden="true">‹</span>
                      <span>Settings</span>
                    </button>
                    <button class="settings-close" data-action="settings-close" data-shortcut="X" aria-label="Close changelog" title="Esc">×</button>
                  </div>
                </div>

                <div class="changelog-screen-body changelog-panel">
                  ${changelogItems}
                </div>
              </section>
            ` : isWishlistOpen ? `
              <section class="changelog-screen glass" role="dialog" aria-modal="true" aria-labelledby="wishlistTitle">
                <div class="settings-head">
                  <div class="brand">
                    <span>Game Timer</span>
                    <h2 id="wishlistTitle">Wishlist</h2>
                  </div>
                  <div class="settings-module-actions">
                    <button class="action-btn settings-back-btn" data-action="wishlist-back" data-shortcut="B" title="Backspace">
                      <span aria-hidden="true">‹</span>
                      <span>Settings</span>
                    </button>
                    <button class="settings-close" data-action="settings-close" data-shortcut="X" aria-label="Close wishlist" title="Esc">×</button>
                  </div>
                </div>

                <div class="changelog-screen-body changelog-panel">
                  ${wishlistControls}
                  ${wishlistItems}
                </div>
              </section>
            ` : `
              <section class="settings-modal glass" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
                <div class="settings-head">
                  <div class="brand">
                    <span>Game Timer</span>
                    <h2 id="settingsTitle">Settings</h2>
                  </div>
                  <button class="settings-close" data-action="settings-close" data-shortcut="X" aria-label="Close settings" title="Esc">×</button>
                </div>

                <div class="settings-row">
                  <span class="settings-title">
                    <strong>Appearance</strong>
                    <span>${themeMode === "dark" ? "Dark mode" : "Light mode"}</span>
                    <span class="shortcut-hint"><kbd class="shortcut-key">A</kbd> Toggle appearance</span>
                  </span>
                  <button class="theme-toggle" data-action="theme-toggle" data-shortcut="A" data-mode="${esc(themeMode)}" aria-label="Toggle light and dark mode">
                    <span class="theme-light">Light</span>
                    <span class="theme-dark">Dark</span>
                  </button>
                </div>

                <div class="settings-row">
                  <span class="settings-title">
                    <strong>Primary Display Name</strong>
                    <span>${displayNameMode === "faction" ? "Faction Name" : "Player Name"}</span>
                    <span class="shortcut-hint"><kbd class="shortcut-key">N</kbd> Toggle name display</span>
                  </span>
                  <button class="theme-toggle display-toggle" data-action="display-toggle" data-shortcut="N" data-mode="${esc(displayNameMode)}" aria-label="Toggle primary display name">
                    <span class="display-player">Player</span>
                    <span class="display-faction">Faction</span>
                  </button>
                </div>

                <div class="settings-row">
                  <span class="settings-title">
                    <strong>Text Type</strong>
                    <span>${textType === "emoji" ? "Emoji labels" : "Text labels"}</span>
                    <span class="shortcut-hint"><kbd class="shortcut-key">E</kbd> Toggle text type</span>
                  </span>
                  <button class="theme-toggle text-toggle" data-action="text-toggle" data-shortcut="E" data-mode="${esc(textType)}" aria-label="Toggle text type">
                    <span class="text-text">Text</span>
                    <span class="text-emoji">😍💗🔤</span>
                  </button>
                </div>

                <div class="settings-row">
                  <span class="settings-title">
                    <strong>Date Format</strong>
                    <span>${dateFormat === "dmy" ? "06 May 2026" : dateFormat === "ymd" ? "2026-05-06" : "May 6, 2026"}</span>
                    <span class="shortcut-hint"><kbd class="shortcut-key">D</kbd> Cycle date format</span>
                  </span>
                  <button class="theme-toggle date-toggle" data-action="date-toggle" data-shortcut="D" data-mode="${esc(dateFormat)}" aria-label="Toggle date format">
                    <span class="date-mdy">MDY</span>
                    <span class="date-dmy">DMY</span>
                    <span class="date-ymd">YMD</span>
                  </button>
                </div>

                <div class="settings-row">
                  <span class="settings-title">
                    <strong>Time Format</strong>
                    <span>${timeFormat === "units" ? "#h #m #s" : "h:m:ss"}</span>
                    <span class="shortcut-hint"><kbd class="shortcut-key">T</kbd> Toggle time format</span>
                  </span>
                  <button class="theme-toggle format-toggle" data-action="format-toggle" data-shortcut="T" data-mode="${esc(timeFormat)}" aria-label="Toggle timestamp format">
                    <span class="format-clock">h:m:ss</span>
                    <span class="format-units">#h #m #s</span>
                  </button>
                </div>

                <button class="settings-cell" data-action="changelog-toggle" data-shortcut="C" aria-expanded="false">
                  <span class="settings-title">
                    <strong>Changelog</strong>
                    <span>${CHANGELOG.length} release${CHANGELOG.length === 1 ? "" : "s"}</span>
                  </span>
                  <span class="settings-chevron" aria-hidden="true">›</span>
                </button>

                <button class="settings-cell" data-action="wishlist-toggle" data-shortcut="W" aria-expanded="false">
                  <span class="settings-title">
                    <strong>Wishlist</strong>
                    <span>${WISHLIST_ITEMS.length} item${WISHLIST_ITEMS.length === 1 ? "" : "s"}</span>
                  </span>
                  <span class="settings-chevron" aria-hidden="true">›</span>
                </button>
              </section>
            `}
          </div>
        ` : ""}
      `;
        }

        function bindSettingsEvents() {
            app.querySelector("[data-action='settings-open']")?.addEventListener("click", () => {
                isSettingsOpen = true;
                render();
            });

            app.querySelector("[data-action='settings-close']")?.addEventListener("click", () => {
                closeSettings();
            });

            app.querySelector("[data-action='settings-backdrop']")?.addEventListener("click", event => {
                if (event.target === event.currentTarget) {
                    closeSettings();
                }
            });

            app.querySelector("[data-action='theme-toggle']")?.addEventListener("click", () => {
                setThemeMode(themeMode === "dark" ? "light" : "dark");
            });

            app.querySelector("[data-action='format-toggle']")?.addEventListener("click", () => {
                setTimeFormat(timeFormat === "clock" ? "units" : "clock");
            });

            app.querySelector("[data-action='date-toggle']")?.addEventListener("click", () => {
                toggleDateFormat();
            });

            app.querySelector("[data-action='display-toggle']")?.addEventListener("click", () => {
                setDisplayNameMode(displayNameMode === "player" ? "faction" : "player");
            });

            app.querySelector("[data-action='text-toggle']")?.addEventListener("click", () => {
                setTextType(textType === "text" ? "emoji" : "text");
            });

            app.querySelector("[data-action='changelog-toggle']")?.addEventListener("click", () => {
                isChangelogOpen = true;
                isWishlistOpen = false;
                render();
            });

            app.querySelector("[data-action='changelog-back']")?.addEventListener("click", () => {
                backToSettingsModule();
            });

            app.querySelector("[data-action='wishlist-toggle']")?.addEventListener("click", () => {
                isWishlistOpen = true;
                isChangelogOpen = false;
                render();
            });

            app.querySelector("[data-action='wishlist-back']")?.addEventListener("click", () => {
                backToSettingsModule();
            });

            app.querySelector("[data-action='wishlist-direction-toggle']")?.addEventListener("click", () => {
                wishlistSortDirection = wishlistSortDirection === "asc" ? "desc" : "asc";
                render();
            });

            app.querySelector("[data-action='wishlist-reset']")?.addEventListener("click", () => {
                resetWishlistControls();
                render();
            });

            app.querySelectorAll("[data-action='wishlist-control']").forEach(select => {
                select.addEventListener("change", event => {
                    const field = event.currentTarget.dataset.field;
                    const value = event.currentTarget.value;
                    if (field === "sort") wishlistSortMode = value;
                    if (field === "category") wishlistCategoryFilter = value;
                    if (field === "priority") wishlistPriorityFilter = value;
                    if (field === "loe") wishlistLoeFilter = value;
                    render();
                });
            });
        }

        function render() {
            applyTheme();
            if (state.view === "setup") renderSetup();
            if (state.view === "game") renderGame();
            if (state.view === "summary") renderSummary();
            if (app.insertAdjacentHTML) {
                app.insertAdjacentHTML("beforeend", settingsMarkup());
            } else {
                app.innerHTML += settingsMarkup();
            }
            bindSettingsEvents();
        }

        ensureRuleLookup();
        document.addEventListener("keydown", handleTestingHotkeys);
        document.addEventListener("keyup", handleShortcutHintKeyup);
        window.addEventListener("blur", () => setShortcutHintsActive(false));
        window.addEventListener("resize", scheduleSessionDensityCheck);
        window.visualViewport?.addEventListener("resize", scheduleSessionDensityCheck);
        render();
    </script>
</body>

</html>
